[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "RUF",  # ruff-specific
]
ignore = [
  "E501",    # line-length (handled by formatter)
  "B008",    # function-call-in-default-argument (FastAPI Depends pattern)
  "E712",    # == True comparisons (SQLAlchemy filter pattern)
  "RUF001",  # ambiguous unicode (intentional HTML entities like ×)
  "UP046",   # Generic[T] style (Pydantic BaseModel convention)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
