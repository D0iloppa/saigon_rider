<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>502 — Saigon Rider</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f13;
      --surface: #1a1a22;
      --border:  rgba(255,255,255,.08);
      --orange:  #ff8055;
      --orange2: #ffaa44;
      --text:    #f0ede8;
      --muted:   rgba(240,237,232,.45);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow: hidden;
    }

    /* road lines animation */
    .road {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent, rgba(255,128,85,.04));
      overflow: hidden;
      pointer-events: none;
    }
    .road::before {
      content: '';
      position: absolute;
      bottom: 28px; left: -100%; right: -100%;
      height: 3px;
      background: repeating-linear-gradient(
        to right,
        transparent 0, transparent 40px,
        rgba(255,128,85,.25) 40px, rgba(255,128,85,.25) 80px
      );
      animation: roadMove 1.2s linear infinite;
    }
    @keyframes roadMove { to { transform: translateX(80px); } }

    /* glow */
    .glow {
      position: fixed;
      top: -180px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at center, rgba(255,128,85,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* card */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }

    /* moto icon */
    .moto {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 12px;
      display: inline-block;
      animation: rock .9s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 18px rgba(255,128,85,.4));
    }
    @keyframes rock {
      from { transform: translateX(-3px) rotate(-1deg); }
      to   { transform: translateX( 3px) rotate( 1deg); }
    }

    .code {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--orange);
      background: rgba(255,128,85,.1);
      border: 1px solid rgba(255,128,85,.2);
      border-radius: 6px;
      display: inline-block;
      padding: 3px 10px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 15px;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 13px 32px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #fff;
      text-decoration: none;
      transition: opacity .15s, transform .15s;
      box-shadow: 0 6px 24px rgba(255,128,85,.3);
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); opacity: 1; }

    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(to right, var(--orange), transparent);
      border-radius: 2px;
      margin: 28px auto 0;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,.2);
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <div class="moto">🏍️</div>
    <div class="code">502 · Bad Gateway</div>
    <h1>Hang tight, rider.</h1>
    <p>
      Our backend took a wrong turn.<br />
      The service is temporarily unavailable —<br />
      give it a moment and try again.
    </p>
    <a class="btn" href="javascript:location.reload()">Retry</a>
    <div class="divider"></div>
  </div>

  <p class="footer">SAIGON RIDER &nbsp;·&nbsp; EST. 2026</p>

  <div class="road"></div>
</body>
</html>
