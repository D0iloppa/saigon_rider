# =============================================================
# Saigon Rider — 호스트 nginx 라우팅 (운영)
# 설치: sudo cp deploy/saigon.conf /etc/nginx/conf.d/saigon.conf
#
# letantonsheriff.com + www 를 컨테이너 nginx(127.0.0.1:18090)로 라우팅한다.
# root+www 는 기존 lsh_api.conf 의 server_name 에서 떼어내야 충돌이 없다
# (lsh_api.conf 80블록 server_name 에서 root+www 제거, 443 root+www 블록 비활성).
# manager/go/admin/console/lsh_api 등 나머지 lsh 블록은 불가침.
# 인증서는 기존 letantonsheriff.com cert(SAN에 root+www 포함) 재사용.
# =============================================================

# HTTP → HTTPS (+ certbot acme-challenge 보존: cert 갱신이 root+www 검증에 사용)
server {
    listen 80;
    server_name letantonsheriff.com www.letantonsheriff.com;

    location ^~ /.well-known/acme-challenge/ {
        root /app/nginx/;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name letantonsheriff.com www.letantonsheriff.com;

    ssl_certificate     /etc/letsencrypt/live/letantonsheriff.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/letantonsheriff.com/privkey.pem;

    # 컨테이너 nginx 와 동일 (업로드 413 방지)
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:18090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # https 스킴 전달
        proxy_http_version 1.1;
        proxy_set_header Connection "";                # upstream keepalive
        proxy_buffering off;                           # SSE/스트리밍(가챠) 지연 방지
        proxy_read_timeout 300s;
    }
}
