<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saigon Rider — 배치 BIKE 카탈로그</title>
<style>
:root {
  --c-bg:#0B0D14;--c-surface:#12141E;--c-border:#1E2235;
  --c-text:#F0F2FF;--c-sub:#8A8E9E;--c-brand:#FF5A1F;
  --grade-C:#9CA3AF;--grade-R:#3B82F6;--grade-E:#A855F7;--grade-L:#EAB308;--grade-M:#EC4899;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--c-bg);color:var(--c-text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.svg-defs{position:absolute;width:0;height:0;overflow:hidden}
.header{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header-title span{color:var(--c-brand)}
.header-meta{font-family:var(--font-mono);font-size:11px;color:var(--c-sub);text-align:right;line-height:1.6}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,90,31,.12);border:1px solid rgba(255,90,31,.3);color:var(--c-brand);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}
.mythic-spotlight{background:linear-gradient(135deg,#1a0a2e,#2d1050,#0f0e17);border:1px solid rgba(236,72,153,.3);border-radius:16px;margin:32px;padding:28px;position:relative;overflow:hidden}
.mythic-spotlight::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(236,72,153,.08) 0%,transparent 70%);pointer-events:none}
.spotlight-label{font-family:var(--font-mono);font-size:10px;letter-spacing:3px;color:#EC4899;margin-bottom:16px;text-transform:uppercase}
.spotlight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.spotlight-card{background:rgba(255,255,255,.03);border:1px solid rgba(236,72,153,.2);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;transition:border-color .2s}
.spotlight-card:hover{border-color:rgba(236,72,153,.5)}
.spotlight-svg{width:100%;height:120px;background:#0a0814;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.spotlight-svg svg{width:280px;height:115px}
.spotlight-name{font-size:13px;font-weight:700;color:#F9A8D4}
.spotlight-meta{font-family:var(--font-mono);font-size:10px;color:var(--c-sub)}
.filters{display:flex;gap:12px;margin:0 32px 24px;flex-wrap:wrap;align-items:center}
.filter-label{font-family:var(--font-mono);font-size:10px;color:var(--c-sub);text-transform:uppercase;letter-spacing:1px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:20px;border:1px solid var(--c-border);background:transparent;color:var(--c-sub);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font-mono)}
.btn:hover{border-color:#3B82F6;color:var(--c-text)}
.btn.active{background:rgba(59,130,246,.15);border-color:#3B82F6;color:#93C5FD}
.btn[data-grade="C"].active{background:rgba(156,163,175,.15);border-color:var(--grade-C);color:var(--grade-C)}
.btn[data-grade="R"].active{background:rgba(59,130,246,.15);border-color:var(--grade-R);color:#93C5FD}
.btn[data-grade="E"].active{background:rgba(168,85,247,.15);border-color:var(--grade-E);color:#D8B4FE}
.btn[data-grade="L"].active{background:rgba(234,179,8,.15);border-color:var(--grade-L);color:#FDE047}
.btn[data-grade="M"].active{background:rgba(236,72,153,.15);border-color:var(--grade-M);color:#F9A8D4}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:0 32px 32px}
.item-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:14px;overflow:hidden;transition:transform .2s,border-color .2s;position:relative}
.item-card:hover{transform:translateY(-2px);border-color:#2E3352}
.item-card[data-grade="C"]{border-top:2px solid var(--grade-C)}
.item-card[data-grade="R"]{border-top:2px solid var(--grade-R)}
.item-card[data-grade="E"]{border-top:2px solid var(--grade-E)}
.item-card[data-grade="L"]{border-top:2px solid var(--grade-L)}
.item-card[data-grade="M"]{border-top:2px solid var(--grade-M);border-color:rgba(236,72,153,.3);box-shadow:0 0 20px rgba(236,72,153,.08)}
.svg-preview{width:100%;height:160px;background:linear-gradient(180deg,#0d0f1a 0%,#080910 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
.svg-preview svg{width:360px;height:150px}
.card-info{padding:14px 16px}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:13px;font-weight:700;line-height:1.3}
.card-id{font-family:var(--font-mono);font-size:9px;color:var(--c-sub);margin-top:2px}
.grade-badge{flex-shrink:0;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;font-family:var(--font-mono)}
.grade-badge.C{background:rgba(156,163,175,.15);color:var(--grade-C);border:1px solid var(--grade-C)}
.grade-badge.R{background:rgba(59,130,246,.15);color:#93C5FD;border:1px solid var(--grade-R)}
.grade-badge.E{background:rgba(168,85,247,.15);color:#D8B4FE;border:1px solid var(--grade-E)}
.grade-badge.L{background:rgba(234,179,8,.15);color:#FDE047;border:1px solid var(--grade-L)}
.grade-badge.M{background:rgba(236,72,153,.15);color:#F9A8D4;border:1px solid var(--grade-M)}
.new-badge{position:absolute;top:8px;left:8px;background:var(--c-brand);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px;letter-spacing:.5px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10px;color:var(--c-sub);background:rgba(255,255,255,.04);border:1px solid var(--c-border);border-radius:6px;padding:2px 8px}
.stats-footer{background:var(--c-surface);border-top:1px solid var(--c-border);padding:20px 32px;display:flex;gap:32px;flex-wrap:wrap;align-items:center}
.stat{font-family:var(--font-mono)}
.stat-value{font-size:22px;font-weight:800}
.stat-label{font-size:10px;color:var(--c-sub);text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div id="svg-sprite" style="display:none"></div>

<div class="header">
  <div>
    <div class="header-title">Saigon Rider <span>· 배치 BIKE</span></div>
    <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
      <span class="header-badge">🏍️ MOTORCYCLE_BODY</span>
      <span class="header-badge" style="background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:#93C5FD">25 ITEMS</span>
      <span class="header-badge" style="background:rgba(16,163,74,.1);border-color:rgba(16,163,74,.3);color:#4ade80">0 v5 REUSE</span>
    </div>
  </div>
  <div class="header-meta">saigon-rider-bikes-v5.svg<br>5 차종 × 5 등급 = 25개<br>C×5 · R×5 · E×5 · L×5 · M×5</div>
</div>

<div class="mythic-spotlight">
  <div class="spotlight-label">★ MYTHIC SPOTLIGHT · 5 vehicles</div>
  <div class="spotlight-grid" id="mythic-grid"></div>
</div>

<div class="filters">
  <span class="filter-label">등급:</span>
  <div class="filter-group">
    <button class="btn active" onclick="filterGrade('ALL')">ALL</button>
    <button class="btn" data-grade="C" onclick="filterGrade('C')">C Common</button>
    <button class="btn" data-grade="R" onclick="filterGrade('R')">R Rare</button>
    <button class="btn" data-grade="E" onclick="filterGrade('E')">E Epic</button>
    <button class="btn" data-grade="L" onclick="filterGrade('L')">L Legendary</button>
    <button class="btn" data-grade="M" onclick="filterGrade('M')">M Mythic</button>
  </div>
  <span class="filter-label" style="margin-left:16px">차종:</span>
  <div class="filter-group">
    <button class="btn active" onclick="filterType('ALL')">ALL</button>
    <button class="btn" data-type="Scooter" onclick="filterType('Scooter')">🛵 Scooter</button>
    <button class="btn" data-type="Automatic" onclick="filterType('Automatic')">🏍️ Automatic</button>
    <button class="btn" data-type="Sport" onclick="filterType('Sport')">⚡ Sport</button>
    <button class="btn" data-type="Premium" onclick="filterType('Premium')">💎 Premium</button>
    <button class="btn" data-type="Classic" onclick="filterType('Classic')">🏛️ Classic</button>
  </div>
</div>

<div class="catalog-grid" id="catalog-grid"></div>

<div class="stats-footer">
  <div class="stat"><div class="stat-value" style="color:var(--c-brand)">25</div><div class="stat-label">Total Items</div></div>
  <div class="stat"><div class="stat-value" style="color:#16A34A">0</div><div class="stat-label">v5 Reuse</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-M)">5</div><div class="stat-label">Mythic</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-L)">5</div><div class="stat-label">Legendary</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-E)">5</div><div class="stat-label">Epic</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-R)">5</div><div class="stat-label">Rare</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-C)">5</div><div class="stat-label">Common</div></div>
  <div class="stat" style="margin-left:auto"><div class="stat-value" style="color:var(--c-sub);font-size:14px">배치 BIKE</div><div class="stat-label">saigon-rider-bikes-v5.svg</div></div>
</div>

<script>
const ITEMS=[
  {id:'MOTORCYCLE_BODY_STREET_CLASSIC_C_01',name:'Daily Commuter',type:'Scooter',collection:'STREET_CLASSIC',grade:'C'},
  {id:'MOTORCYCLE_BODY_DELIVERY_HUSTLE_R_01',name:'GrabBike Yellow',type:'Scooter',collection:'DELIVERY_HUSTLE',grade:'R'},
  {id:'MOTORCYCLE_BODY_MEKONG_DELTA_E_01',name:'Mekong Bamboo',type:'Scooter',collection:'MEKONG_DELTA',grade:'E'},
  {id:'MOTORCYCLE_BODY_TET_FESTIVAL_L_01',name:'Lunar New Year Special',type:'Scooter',collection:'TET_FESTIVAL',grade:'L'},
  {id:'MOTORCYCLE_BODY_LEGEND_OF_SAIGON_M_01',name:'Sài Gòn Golden Wave',type:'Scooter',collection:'LEGEND_OF_SAIGON',grade:'M'},
  {id:'MOTORCYCLE_BODY_STREET_CLASSIC_C_02',name:'Urban Air',type:'Automatic',collection:'STREET_CLASSIC',grade:'C'},
  {id:'MOTORCYCLE_BODY_NEON_SAIGON_R_01',name:'Neon Lead',type:'Automatic',collection:'NEON_SAIGON',grade:'R'},
  {id:'MOTORCYCLE_BODY_DELIVERY_HUSTLE_E_01',name:'Express Hustle',type:'Automatic',collection:'DELIVERY_HUSTLE',grade:'E'},
  {id:'MOTORCYCLE_BODY_SAIGON_GHOST_L_01',name:'Midnight Air Blade',type:'Automatic',collection:'SAIGON_GHOST',grade:'L'},
  {id:'MOTORCYCLE_BODY_LEGEND_OF_SAIGON_M_02',name:'Imperial NVX',type:'Automatic',collection:'LEGEND_OF_SAIGON',grade:'M'},
  {id:'MOTORCYCLE_BODY_STREET_CLASSIC_C_03',name:'Daily Sport',type:'Sport',collection:'STREET_CLASSIC',grade:'C'},
  {id:'MOTORCYCLE_BODY_NEON_SAIGON_R_02',name:'Cyber Exciter',type:'Sport',collection:'NEON_SAIGON',grade:'R'},
  {id:'MOTORCYCLE_BODY_SAIGON_GHOST_E_01',name:'Phantom Winner',type:'Sport',collection:'SAIGON_GHOST',grade:'E'},
  {id:'MOTORCYCLE_BODY_TET_FESTIVAL_L_02',name:'Dragon Year Racer',type:'Sport',collection:'TET_FESTIVAL',grade:'L'},
  {id:'MOTORCYCLE_BODY_LEGEND_OF_SAIGON_M_03',name:'Sài Gòn Crown Racer',type:'Sport',collection:'LEGEND_OF_SAIGON',grade:'M'},
  {id:'MOTORCYCLE_BODY_STREET_CLASSIC_C_04',name:'Quận 1 Cruiser',type:'Premium',collection:'STREET_CLASSIC',grade:'C'},
  {id:'MOTORCYCLE_BODY_LEGEND_OF_SAIGON_R_01',name:'Golden Vespa Hint',type:'Premium',collection:'LEGEND_OF_SAIGON',grade:'R'},
  {id:'MOTORCYCLE_BODY_NEON_SAIGON_E_01',name:'Bùi Viện Neon SH',type:'Premium',collection:'NEON_SAIGON',grade:'E'},
  {id:'MOTORCYCLE_BODY_SAIGON_GHOST_L_02',name:'Ghost SH 350',type:'Premium',collection:'SAIGON_GHOST',grade:'L'},
  {id:'MOTORCYCLE_BODY_LEGEND_OF_SAIGON_M_04',name:'Imperial SH Crown',type:'Premium',collection:'LEGEND_OF_SAIGON',grade:'M'},
  {id:'MOTORCYCLE_BODY_STREET_CLASSIC_C_05',name:'Heritage Cub',type:'Classic',collection:'STREET_CLASSIC',grade:'C'},
  {id:'MOTORCYCLE_BODY_MEKONG_DELTA_R_01',name:'Delta Wood Cub',type:'Classic',collection:'MEKONG_DELTA',grade:'R'},
  {id:'MOTORCYCLE_BODY_STREET_CLASSIC_E_01',name:'Café Racer 70s',type:'Classic',collection:'STREET_CLASSIC',grade:'E'},
  {id:'MOTORCYCLE_BODY_TET_FESTIVAL_L_03',name:'Vintage Tết Cub',type:'Classic',collection:'TET_FESTIVAL',grade:'L'},
  {id:'MOTORCYCLE_BODY_LEGEND_OF_SAIGON_M_05',name:'Saigon 1975 Legendary Cub',type:'Classic',collection:'LEGEND_OF_SAIGON',grade:'M'},
];
const typeIcons={Scooter:'🛵',Automatic:'🏍️',Sport:'⚡',Premium:'💎',Classic:'🏛️'};
let gradeFilter='ALL',typeFilter='ALL';

function mkSVG(id){
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200"><use href="#item-${id}"/></svg>`;
}
function renderMythic(){
  document.getElementById('mythic-grid').innerHTML=ITEMS.filter(i=>i.grade==='M').map(item=>`
    <div class="spotlight-card">
      <div class="spotlight-svg">${mkSVG(item.id)}</div>
      <div class="spotlight-name">${typeIcons[item.type]} ${item.name}</div>
      <div class="spotlight-meta">${item.type} · ${item.collection}</div>
    </div>`).join('');
}
function renderGrid(){
  let f=ITEMS;
  if(gradeFilter!=='ALL') f=f.filter(i=>i.grade===gradeFilter);
  if(typeFilter!=='ALL') f=f.filter(i=>i.type===typeFilter);
  document.getElementById('catalog-grid').innerHTML=f.map(item=>`
    <div class="item-card" data-grade="${item.grade}">
      <span class="new-badge">NEW</span>
      <div class="svg-preview">${mkSVG(item.id)}</div>
      <div class="card-info">
        <div class="card-header">
          <div>
            <div class="card-name">${typeIcons[item.type]} ${item.name}</div>
            <div class="card-id">item-${item.id}</div>
          </div>
          <span class="grade-badge ${item.grade}">${item.grade}</span>
        </div>
        <div class="card-tags">
          <span class="tag">${item.type}</span>
          <span class="tag">${item.collection}</span>
          <span class="tag">MOTORCYCLE_BODY</span>
        </div>
      </div>
    </div>`).join('');
}
function filterGrade(g){
  gradeFilter=g;
  document.querySelectorAll('[data-grade]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.btn:not([data-grade]):not([data-type])').forEach(b=>b.classList.remove('active'));
  if(g==='ALL') document.querySelector('.btn:not([data-grade]):not([data-type])').classList.add('active');
  else document.querySelector(`[data-grade="${g}"]`).classList.add('active');
  renderGrid();
}
function filterType(t){
  typeFilter=t;
  document.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active'));
  // find ALL type button
  const allBtns=[...document.querySelectorAll('.btn:not([data-grade]):not([data-type])')];
  if(allBtns[1]) allBtns[1].classList.remove('active');
  if(t==='ALL'&&allBtns[1]) allBtns[1].classList.add('active');
  else if(t!=='ALL') document.querySelector(`[data-type="${t}"]`)?.classList.add('active');
  renderGrid();
}
async function loadSprite(){
  try{
    const r=await fetch('saigon-rider-bikes-v5.svg');
    document.getElementById('svg-sprite').innerHTML=await r.text();
  }catch(e){console.warn('SVG load failed:',e)}
  renderMythic();renderGrid();
}
loadSprite();
</script>
</body>
</html>
