<style>
  .feed-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .feed-card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .feed-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
  }
  .feed-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    background: rgba(255,255,255,.05);
    flex-shrink: 0;
  }
  .feed-meta { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .feed-nick { font-size: 13px; font-weight: 700; color: #fff; }
  .feed-date { font-size: 11px; color: rgba(255,255,255,.4); }
  .feed-img { width: 100%; aspect-ratio: 1 / 1; background: rgba(255,255,255,.03); position: relative; overflow: hidden; }
  .feed-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .feed-img-multi { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; aspect-ratio: 1 / 1; }
  .feed-img-multi img { width: 100%; height: 100%; object-fit: cover; }
  .feed-img-multi img:only-child { grid-column: 1 / -1; }
  .feed-img-multi img:nth-child(n+5) { display: none; }
  .feed-img-count {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,.6); color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 8px;
  }
  .feed-caption {
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: rgba(255,255,255,.85);
    flex: 1;
    word-break: break-word;
    white-space: normal;
  }
  .feed-caption .hashtag { color: #ff8055; font-weight: 600; }
  .feed-foot {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .feed-stat { font-size: 12px; color: rgba(255,255,255,.55); }
  .feed-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
</style>

<div class="toolbar">
  <div>
    <p class="page-title">피드 관리</p>
    <p class="page-sub">인스타그램 스타일 피드 · 등록 / 수정 / 삭제 · 해시태그 강조</p>
  </div>
  <div>
    <a href="/admin/feed/new" class="btn">＋ 관리자 게시</a>
  </div>
</div>

<div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px;">총 {{total}} 건</div>

<div class="feed-grid">
  {{cards}}
</div>

<div class="pagination">{{pagination}}</div>
