<style>
  .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab {
    padding: 6px 16px; border-radius: 20px;
    font-size: 13px; color: rgba(255,255,255,.6);
    text-decoration: none; border: 1px solid rgba(255,255,255,.12);
    transition: all .15s;
  }
  .tab.active, .tab:hover {
    background: rgba(255,165,0,.15); color: #ffa500;
    border-color: rgba(255,165,0,.4);
  }
</style>

<div class="toolbar">
  <div>
    <p class="page-title">고객센터</p>
    <p class="page-sub">유저 문의 목록 · 상태별 필터 · 클릭하여 답변</p>
  </div>
  <div style="font-size:12px;color:rgba(255,255,255,.4);">총 {{total}} 건</div>
</div>

<div class="tab-bar">{{status_tabs}}</div>

<table class="data-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>제목</th>
      <th>상태</th>
      <th>미읽음</th>
      <th>등록일</th>
    </tr>
  </thead>
  <tbody>
    {{rows}}
  </tbody>
</table>

<div class="pagination">{{pagination}}</div>
