<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saigon Rider — Batch 7 CUSTOM Catalog</title>
<style>
  :root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2a;--text:#e2e2f0;--muted:#6b6b8a;--primary:#00F0FF;--accent:#FF2D9C}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}
  header{background:linear-gradient(135deg,#0a0a0f 0%,#12071c 50%,#0a0a0f 100%);border-bottom:1px solid var(--border);padding:24px 32px}
  .header-inner{max-width:1400px;margin:0 auto}
  h1{font-size:1.4rem;font-weight:900;letter-spacing:.12em;background:linear-gradient(90deg,#FF2D9C,#FF7438,#FFB800,#00F0FF,#B6FF1C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sub{color:var(--muted);font-size:.72rem;letter-spacing:.08em;margin-top:6px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;padding:18px 32px;background:var(--surface);border-bottom:1px solid var(--border);max-width:1400px;margin:0 auto}
  button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.72rem;letter-spacing:.06em;transition:all .2s}
  button.active,button:hover{border-color:var(--primary);color:var(--primary)}
  button.slot-btn.active{border-color:#FFB800;color:#FFB800}
  .sep{width:1px;background:var(--border);margin:0 2px}
  .grid-wrap{max-width:1400px;margin:0 auto;padding:28px 24px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .2s,border-color .2s}
  .card:hover{transform:translateY(-4px);border-color:rgba(0,240,255,.3)}
  .card[data-rarity="M"]{border-color:rgba(255,45,156,.35)}
  .card[data-rarity="M"]:hover{border-color:#FF2D9C}
  .card[data-rarity="L"]{border-color:rgba(255,184,0,.25)}
  .card[data-rarity="L"]:hover{border-color:#FFB800}
  .card[data-rarity="E"]{border-color:rgba(0,240,255,.2)}
  .thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#0d0d18;position:relative;overflow:hidden}
  .thumb svg{width:88%;height:88%}
  .info{padding:10px 10px 8px}
  .item-id{font-size:.6rem;color:var(--muted);word-break:break-all;line-height:1.5}
  .badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .badge{font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.06em;text-transform:uppercase}
  .badge-C{background:#1f2937;color:#9ca3af}.badge-R{background:#1a2840;color:#60a5fa}
  .badge-E{background:#1a0a2e;color:#a78bfa}.badge-L{background:#2a1a00;color:#fbbf24}
  .badge-M{background:#2a001a;color:#f9a8d4}
  .badge-slot{background:rgba(0,240,255,.08);color:var(--primary);border:1px solid rgba(0,240,255,.2)}
  .badge-new{background:rgba(74,222,128,.08);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
  .hidden{display:none!important}
  /* Mythic Spotlight */
  .mythic-section{max-width:1400px;margin:0 auto 8px;padding:0 24px}
  .mythic-banner{background:linear-gradient(135deg,#12071c,#1a0a2e,#12071c);border:1px solid rgba(255,45,156,.35);border-radius:12px;padding:20px 24px;position:relative;overflow:hidden}
  .mythic-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(255,45,156,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(0,240,255,.08) 0%,transparent 60%)}
  .mythic-title{font-size:.65rem;font-weight:700;letter-spacing:.15em;color:rgba(255,45,156,.7);margin-bottom:8px}
  .mythic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;position:relative}
  .mythic-item{background:rgba(0,0,0,.4);border:1px solid rgba(255,45,156,.25);border-radius:8px;overflow:hidden;text-align:center}
  .mythic-item .thumb{background:#0a020f}
  .mythic-label{font-size:.58rem;color:rgba(249,168,212,.7);padding:6px 4px;word-break:break-all;line-height:1.4}
  /* footer */
  footer{max-width:1400px;margin:32px auto 0;padding:18px 24px;border-top:1px solid var(--border);display:flex;gap:24px;flex-wrap:wrap;font-size:.7rem;color:var(--muted)}
  .stat-val{color:var(--text);font-weight:700}
</style>
</head>
