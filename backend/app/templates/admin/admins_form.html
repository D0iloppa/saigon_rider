<div class="breadcrumb">
  <a href="/admin/admins">관리자 계정</a> <span>›</span> <span>{{mode_label}}</span>
</div>

<p class="page-title">{{mode_label}}</p>
<p class="page-sub">{{form_sub}}</p>

<form method="post" action="{{form_action}}">
  <div class="card" style="margin-bottom:24px;">
    <div class="field">
      <label class="field-label">아이디 *</label>
      <input type="text" name="username" value="{{username}}" required autocomplete="off"
             pattern="[A-Za-z0-9_.-]{3,50}" minlength="3" maxlength="50"
             style="width:100%;" {{username_readonly}} />
      <p style="font-size:11px;color:rgba(255,255,255,.35);margin-top:6px;">영문/숫자/._- · 3~50자</p>
    </div>

    <div class="field">
      <label class="field-label">비밀번호 {{password_required_label}}</label>
      <input type="password" name="password" value="" autocomplete="new-password"
             minlength="6" maxlength="200" style="width:100%;" {{password_required}} />
      <p style="font-size:11px;color:rgba(255,255,255,.35);margin-top:6px;">{{password_hint}}</p>
    </div>

    <div class="field">
      <label class="field-label">메모 (선택)</label>
      <input type="text" name="note" value="{{note}}" maxlength="200" style="width:100%;" placeholder="예: 운영팀 김OO" />
    </div>
  </div>

  <div style="display:flex;gap:10px;justify-content:flex-end;">
    <a href="/admin/admins" class="btn btn-ghost">취소</a>
    <button type="submit" class="btn">{{submit_label}}</button>
  </div>
</form>
