server {
    listen 80;
    server_name localhost;

    # Docker 내부 DNS resolver (backend / wiki profile 미사용 시에도 nginx 기동 가능)
    resolver 127.0.0.11 valid=10s;

    # 업로드 용량 제한 없음 (기본값 1MB → 아바타 등 파일 업로드 413 방지)
    client_max_body_size 0;

    # Custom error pages
    error_page 502 503 504 /502.html;
    location = /502.html {
        root /etc/nginx/pages;
        internal;
    }

    # Frontend — 프로덕션 빌드를 nginx가 정적 서빙
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # BFF API (/api/bff/* → bff:8080/api/*)
    location /api/bff/ {
        set $bff_url http://bff:8080;
        rewrite ^/api/bff/(.*) /api/$1 break;
        proxy_pass $bff_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SRE Engine API (/api/sre/* → engine:8090/v1/*)
    location /api/sre/ {
        set $engine_url http://engine:8090;
        rewrite ^/api/sre/(.*) /v1/$1 break;
        proxy_pass $engine_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Key $http_x_service_key;
    }

    # MCP Dev Server — REST API (/api/bff/dev/* → mcp_dev, 위키 하위호환)
    location /api/bff/dev/ {
        set $mcp_dev_url http://mcp_dev:8095;
        rewrite ^/api/bff/dev/(.*) /api/dev/$1 break;
        proxy_pass $mcp_dev_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP Dev Server — REST API 직접 경로
    location /api/dev/ {
        set $mcp_dev_url http://mcp_dev:8095;
        proxy_pass $mcp_dev_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP Dev Server — Streamable HTTP transport (Claude Code 연결)
    location /mcp-dev/ {
        set $mcp_dev_url http://mcp_dev:8095;
        rewrite ^/mcp-dev/(.*) /mcp/$1 break;
        proxy_pass $mcp_dev_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Admin Console — BFF가 직접 서빙 (/admin/static/ 포함)
    location /admin/ {
        set $bff_url http://bff:8080;
        proxy_pass $bff_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Engine — 내부 Docker 네트워크(172.16/12)에서만 허용, 외부 직접 접근 차단
    location /engine/ {
        allow 172.16.0.0/12;
        deny all;
        set $engine_url http://engine:8090;
        proxy_pass $engine_url/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Service-Key $http_x_service_key;
    }

    # Imgproxy - 이미지 처리
    location /img/ {
        proxy_pass http://imgproxy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Wiki (Docusaurus) ─────────────────────────────────────
    # Private 섹션: HTTP Basic Auth 적용 (더 구체적인 location이 우선)
    location /wiki/docs/private/ {
        auth_basic "Saigon Rider — Private Docs";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $wiki_url http://wiki:80;
        proxy_pass $wiki_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Public 섹션: 인증 없이 접근 가능
    location /wiki/ {
        set $wiki_url http://wiki:80;
        proxy_pass $wiki_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /wiki 트레일링 슬래시 리다이렉트
    location = /wiki {
        return 301 /wiki/;
    }
}
