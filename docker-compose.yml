networks:
  dev-net:
    driver: bridge
    name: ${NETWORK_BRIDGE}

volumes:
  saigon_db_data:

services:

  # ── Nginx (Reverse Proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: saigon_nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/docker-entrypoint.d:/docker-entrypoint.d:ro
    networks:
      - dev-net
    depends_on:
      - frontend
      - imgproxy
    environment:
      - WIKI_AUTH_USER=${WIKI_AUTH_USER:-admin}
      - WIKI_AUTH_PASS=${WIKI_AUTH_PASS:-changeme}
    restart: unless-stopped

  # ── Frontend (React + Vite → nginx 정적 서빙) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saigon_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - dev-net
    restart: unless-stopped

  # ── Imgproxy (Image Processing) ───────────────────────────
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: saigon_imgproxy
    volumes:
      - ./contents:/data:ro
    networks:
      - dev-net
    environment:
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/data
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
      - IMGPROXY_MAX_SRC_RESOLUTION=50
      - IMGPROXY_ALLOWED_SOURCES=local://
    restart: unless-stopped

  # ── BFF (FastAPI, 기존 backend → 역할 재정의) ───────────────
  # docker compose --profile backend up
  bff:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saigon_bff
    profiles: [backend]
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./backend:/app
      - ./contents:/data
    networks:
      - dev-net
    depends_on:
      database:
        condition: service_healthy
      engine:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - ENGINE_BASE_URL=http://engine:8090
      - ENGINE_SERVICE_KEY=${ENGINE_SERVICE_KEY}
      - CONTENTS_BASE_PATH=/data
      - IMGPROXY_BASE_URL=${IMGPROXY_BASE_URL}
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
    restart: unless-stopped

  # ── Engine (SRE, 신규) ────────────────────────────────────
  # docker compose --profile backend up
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: saigon_engine
    profiles: [backend]
    ports:
      - "${ENGINE_PORT:-8090}:8090"
    volumes:
      - ./engine:/app
    networks:
      - dev-net
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - ENGINE_SERVICE_KEY=${ENGINE_SERVICE_KEY}
      - ENGINE_ADMIN_JWT_SECRET=${ENGINE_ADMIN_JWT_SECRET}
      - SRE_TIMEZONE=Asia/Ho_Chi_Minh
      - SRE_RP_EXPIRY_MONTHS=3
      - SRE_DAILY_CAP_STANDARD=250
      - SRE_DAILY_CAP_DRIVER=2000
      - SRE_NEW_ACCOUNT_PENALTY_DAYS=3
      - SRE_NEW_ACCOUNT_MULTIPLIER=0.5
      - SRE_IDEMPOTENCY_TTL_DAYS=7
      - SRE_LOG_LEVEL=INFO
    restart: unless-stopped

  # ── Wiki (Docusaurus — 개발자 문서 포털) ──────────────────────
  # docker compose --profile wiki up --build -d
  wiki:
    build:
      context: ./wiki
      dockerfile: Dockerfile
    container_name: saigon_wiki
    profiles: [wiki]
    networks:
      - dev-net
    restart: unless-stopped

  # ── Database (PostgreSQL + PostGIS) ───────────────────────
  # docker compose --profile backend up
  database:
    image: postgis/postgis:15-3.3
    container_name: saigon_db
    profiles: [backend]
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - saigon_db_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dev-net
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
