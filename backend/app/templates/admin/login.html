<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saigon Rider — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #08090f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    /* 배경 그라디언트 장식 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,102,51,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(255,153,51,.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 400px;
      margin: 24px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* 브랜드 */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .08em;
      color: #fff;
    }

    .brand-name span {
      color: #ff6633;
    }

    .brand-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 10px;
      background: rgba(255,102,51,.15);
      border: 1px solid rgba(255,102,51,.35);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      color: #ff8055;
      text-transform: uppercase;
    }

    /* 제목 */
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      margin-bottom: 28px;
    }

    /* 폼 */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.5);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, background .15s;
    }

    input::placeholder { color: rgba(255,255,255,.22); }

    input:focus {
      border-color: rgba(255,102,51,.6);
      background: rgba(255,255,255,.08);
    }

    /* 에러 메시지 */
    .error-msg {
      display: none;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(239,59,59,.1);
      border: 1px solid rgba(239,59,59,.3);
      border-radius: 10px;
      font-size: 13px;
      color: #fc8181;
    }

    .error-msg.visible { display: block; }

    /* 버튼 */
    .btn {
      width: 100%;
      height: 52px;
      margin-top: 8px;
      background: linear-gradient(135deg, #ff6633, #ff9933);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity .15s, transform .1s;
      box-shadow: 0 4px 20px rgba(255,102,51,.35);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 60%);
    }

    .btn:hover { opacity: .92; }
    .btn:active { transform: scale(.98); }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* 구분선 */
    .divider {
      margin: 24px 0 0;
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,.2);
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="brand">
      <div class="brand-name">SAIGON <span>RIDER</span></div>
      <span class="brand-badge">Admin Console</span>
    </div>

    <p class="title">관리자 로그인</p>
    <p class="subtitle">관리자 계정으로 로그인하세요.</p>

    <div class="error-msg" id="errorMsg">아이디 또는 비밀번호가 올바르지 않습니다.</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">아이디</label>
        <input
          id="username"
          type="text"
          name="username"
          placeholder="admin"
          autocomplete="username"
          required
        />
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button class="btn" type="submit" id="submitBtn">로그인</button>
    </form>

    <hr class="divider" />
    <p class="footer">
      Saigon Rider v1.0 &nbsp;·&nbsp; Admin Only<br/>
      <a href="{{wiki_url}}" target="_blank" rel="noopener"
         style="color:rgba(255,255,255,.4);text-decoration:none;font-size:11px;letter-spacing:.04em;">
        ↗ 개발자 위키
      </a>
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = '로그인 중...';

      const body = new URLSearchParams({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      });

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body,
        });

        if (res.ok) {
          window.location.href = '/admin/dashboard';
        } else {
          errorMsg.classList.add('visible');
        }
      } catch {
        errorMsg.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
