<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saigon Rider — 배치 PARTS 카탈로그</title>
<style>
:root {
  --c-bg:#0B0D14;--c-surface:#12141E;--c-border:#1E2235;
  --c-text:#F0F2FF;--c-sub:#8A8E9E;--c-brand:#FF5A1F;
  --grade-C:#9CA3AF;--grade-R:#3B82F6;--grade-E:#A855F7;--grade-L:#EAB308;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--c-bg);color:var(--c-text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.header{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header-title span{color:var(--c-brand)}
.header-meta{font-family:var(--font-mono);font-size:11px;color:var(--c-sub);text-align:right;line-height:1.6}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,90,31,.12);border:1px solid rgba(255,90,31,.3);color:var(--c-brand);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;margin-right:4px;margin-bottom:4px}
.legendary-spotlight{background:linear-gradient(135deg,#1a1200,#2d2000,#0f0e00);border:1px solid rgba(234,179,8,.3);border-radius:16px;margin:32px;padding:28px;position:relative;overflow:hidden}
.legendary-spotlight::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(234,179,8,.08) 0%,transparent 70%);pointer-events:none}
.spotlight-label{font-family:var(--font-mono);font-size:10px;letter-spacing:3px;color:#EAB308;margin-bottom:16px;text-transform:uppercase}
.spotlight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.spotlight-card{background:rgba(255,255,255,.03);border:1px solid rgba(234,179,8,.2);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s}
.spotlight-card:hover{border-color:rgba(234,179,8,.5)}
.spotlight-svg{width:100%;height:110px;background:#080600;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.spotlight-svg svg{width:190px;height:100px}
.spotlight-name{font-size:12px;font-weight:700;color:#FDE047}
.spotlight-meta{font-family:var(--font-mono);font-size:10px;color:var(--c-sub)}
.filters{display:flex;gap:12px;margin:0 32px 24px;flex-wrap:wrap;align-items:center}
.filter-label{font-family:var(--font-mono);font-size:10px;color:var(--c-sub);text-transform:uppercase;letter-spacing:1px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:20px;border:1px solid var(--c-border);background:transparent;color:var(--c-sub);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font-mono)}
.btn:hover{border-color:#3B82F6;color:var(--c-text)}
.btn.active{background:rgba(59,130,246,.15);border-color:#3B82F6;color:#93C5FD}
.btn[data-grade="C"].active{background:rgba(156,163,175,.15);border-color:var(--grade-C);color:var(--grade-C)}
.btn[data-grade="R"].active{background:rgba(59,130,246,.15);border-color:var(--grade-R);color:#93C5FD}
.btn[data-grade="E"].active{background:rgba(168,85,247,.15);border-color:var(--grade-E);color:#D8B4FE}
.btn[data-grade="L"].active{background:rgba(234,179,8,.15);border-color:var(--grade-L);color:#FDE047}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:0 32px 32px}
.item-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s;position:relative}
.item-card:hover{transform:translateY(-2px);border-color:#2E3352}
.item-card[data-grade="C"]{border-top:2px solid var(--grade-C)}
.item-card[data-grade="R"]{border-top:2px solid var(--grade-R)}
.item-card[data-grade="E"]{border-top:2px solid var(--grade-E)}
.item-card[data-grade="L"]{border-top:2px solid var(--grade-L);border-color:rgba(234,179,8,.3);box-shadow:0 0 20px rgba(234,179,8,.06)}
.svg-preview{width:100%;height:120px;background:linear-gradient(180deg,#0d0f1a 0%,#080910 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
.svg-preview svg{width:185px;height:110px}
.card-info{padding:12px 14px}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card-name{font-size:12px;font-weight:700;line-height:1.3}
.card-id{font-family:var(--font-mono);font-size:9px;color:var(--c-sub);margin-top:2px}
.grade-badge{flex-shrink:0;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;font-family:var(--font-mono)}
.grade-badge.C{background:rgba(156,163,175,.15);color:var(--grade-C);border:1px solid var(--grade-C)}
.grade-badge.R{background:rgba(59,130,246,.15);color:#93C5FD;border:1px solid var(--grade-R)}
.grade-badge.E{background:rgba(168,85,247,.15);color:#D8B4FE;border:1px solid var(--grade-E)}
.grade-badge.L{background:rgba(234,179,8,.15);color:#FDE047;border:1px solid var(--grade-L)}
.new-badge{position:absolute;top:7px;left:7px;background:var(--c-brand);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:7px;letter-spacing:.5px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;color:var(--c-sub);background:rgba(255,255,255,.04);border:1px solid var(--c-border);border-radius:5px;padding:2px 6px}
.slot-divider{margin:0 32px 16px;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid var(--c-border);border-radius:10px;font-family:var(--font-mono);font-size:11px;color:var(--c-sub);display:flex;align-items:center;gap:12px}
.slot-divider strong{color:var(--c-text);font-size:13px}
.slot-count{margin-left:auto;font-size:11px;color:var(--c-sub)}
.stats-footer{background:var(--c-surface);border-top:1px solid var(--c-border);padding:20px 32px;display:flex;gap:28px;flex-wrap:wrap;align-items:center}
.stat{font-family:var(--font-mono)}
.stat-value{font-size:20px;font-weight:800}
.stat-label{font-size:10px;color:var(--c-sub);text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div id="svg-sprite" style="display:none"></div>

<div class="header">
  <div>
    <div class="header-title">Saigon Rider <span>· 배치 PARTS</span></div>
    <div style="margin-top:6px">
      <span class="header-badge">💡 HEADLIGHT</span>
      <span class="header-badge">🪞 MIRROR</span>
      <span class="header-badge">🔢 NUMBER</span>
      <span class="header-badge" style="background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:#93C5FD">23 ITEMS</span>
      <span class="header-badge" style="background:rgba(16,163,74,.1);border-color:rgba(16,163,74,.3);color:#4ade80">0 v5 REUSE</span>
    </div>
  </div>
  <div class="header-meta">saigon-rider-parts2-v5.svg<br>HEADLIGHT 10 · MIRROR 6 · NUMBER 7<br>C×10 · R×7 · E×4 · L×2</div>
</div>

<div class="legendary-spotlight">
  <div class="spotlight-label">★ LEGENDARY SPOTLIGHT · 2 items</div>
  <div class="spotlight-grid" id="legendary-grid"></div>
</div>

<div class="filters">
  <span class="filter-label">등급:</span>
  <div class="filter-group" id="grade-filters">
    <button class="btn active" onclick="filterGrade('ALL')">ALL</button>
    <button class="btn" data-grade="C" onclick="filterGrade('C')">C Common</button>
    <button class="btn" data-grade="R" onclick="filterGrade('R')">R Rare</button>
    <button class="btn" data-grade="E" onclick="filterGrade('E')">E Epic</button>
    <button class="btn" data-grade="L" onclick="filterGrade('L')">L Legendary</button>
  </div>
  <span class="filter-label" style="margin-left:16px">슬롯:</span>
  <div class="filter-group" id="slot-filters">
    <button class="btn active" onclick="filterSlot('ALL')">ALL</button>
    <button class="btn" data-slot="HEADLIGHT" onclick="filterSlot('HEADLIGHT')">💡 Headlight</button>
    <button class="btn" data-slot="MIRROR" onclick="filterSlot('MIRROR')">🪞 Mirror</button>
    <button class="btn" data-slot="NUMBER" onclick="filterSlot('NUMBER')">🔢 Number</button>
  </div>
</div>

<div id="catalog-container"></div>

<div class="stats-footer">
  <div class="stat"><div class="stat-value" style="color:var(--c-brand)">23</div><div class="stat-label">Total Items</div></div>
  <div class="stat"><div class="stat-value" style="color:#16A34A">0</div><div class="stat-label">v5 Reuse</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-L)">2</div><div class="stat-label">Legendary</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-E)">4</div><div class="stat-label">Epic</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-R)">7</div><div class="stat-label">Rare</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--grade-C)">10</div><div class="stat-label">Common</div></div>
  <div class="stat" style="margin-left:auto"><div class="stat-value" style="color:var(--c-sub);font-size:14px">배치 PARTS</div><div class="stat-label">saigon-rider-parts2-v5.svg</div></div>
</div>

<script>
const ITEMS=[
  // HEADLIGHT (10)
  {id:'HEADLIGHT_STREET_CLASSIC_C_01',name:'Classic Chrome',slot:'HEADLIGHT',collection:'STREET_CLASSIC',grade:'C'},
  {id:'HEADLIGHT_DELIVERY_HUSTLE_C_02',name:'Delivery Rect',slot:'HEADLIGHT',collection:'DELIVERY_HUSTLE',grade:'C'},
  {id:'HEADLIGHT_MEKONG_DELTA_C_03',name:'Oval Warm',slot:'HEADLIGHT',collection:'MEKONG_DELTA',grade:'C'},
  {id:'HEADLIGHT_SAIGON_GHOST_C_04',name:'Twin-Pod Amber',slot:'HEADLIGHT',collection:'SAIGON_GHOST',grade:'C'},
  {id:'HEADLIGHT_NEON_SAIGON_R_01',name:'Neon DRL Strip',slot:'HEADLIGHT',collection:'NEON_SAIGON',grade:'R'},
  {id:'HEADLIGHT_TET_FESTIVAL_R_02',name:'Dragon Eye',slot:'HEADLIGHT',collection:'TET_FESTIVAL',grade:'R'},
  {id:'HEADLIGHT_LEGEND_OF_SAIGON_R_03',name:'Green Matrix',slot:'HEADLIGHT',collection:'LEGEND_OF_SAIGON',grade:'R'},
  {id:'HEADLIGHT_NEON_SAIGON_E_01',name:'Cyber Slit',slot:'HEADLIGHT',collection:'NEON_SAIGON',grade:'E'},
  {id:'HEADLIGHT_MEKONG_DELTA_E_02',name:'Bio-Organic Teal',slot:'HEADLIGHT',collection:'MEKONG_DELTA',grade:'E'},
  {id:'HEADLIGHT_LEGEND_OF_SAIGON_L_01',name:'Golden Crown',slot:'HEADLIGHT',collection:'LEGEND_OF_SAIGON',grade:'L'},
  // MIRROR (6)
  {id:'MIRROR_STREET_CLASSIC_C_01',name:'Round Chrome',slot:'MIRROR',collection:'STREET_CLASSIC',grade:'C'},
  {id:'MIRROR_DELIVERY_HUSTLE_C_02',name:'Wide Angle',slot:'MIRROR',collection:'DELIVERY_HUSTLE',grade:'C'},
  {id:'MIRROR_MEKONG_DELTA_C_03',name:'Teardrop Navy',slot:'MIRROR',collection:'MEKONG_DELTA',grade:'C'},
  {id:'MIRROR_NEON_SAIGON_R_01',name:'LED Blue',slot:'MIRROR',collection:'NEON_SAIGON',grade:'R'},
  {id:'MIRROR_TET_FESTIVAL_R_02',name:'Dragon Shield',slot:'MIRROR',collection:'TET_FESTIVAL',grade:'R'},
  {id:'MIRROR_LEGEND_OF_SAIGON_E_01',name:'Cyber Hex',slot:'MIRROR',collection:'LEGEND_OF_SAIGON',grade:'E'},
  // NUMBER (7)
  {id:'NUMBER_STREET_CLASSIC_C_01',name:'Standard White',slot:'NUMBER',collection:'STREET_CLASSIC',grade:'C'},
  {id:'NUMBER_DELIVERY_HUSTLE_C_02',name:'Delivery Yellow',slot:'NUMBER',collection:'DELIVERY_HUSTLE',grade:'C'},
  {id:'NUMBER_MEKONG_DELTA_C_03',name:'Blue Light',slot:'NUMBER',collection:'MEKONG_DELTA',grade:'C'},
  {id:'NUMBER_NEON_SAIGON_R_01',name:'Neon Dark Blue',slot:'NUMBER',collection:'NEON_SAIGON',grade:'R'},
  {id:'NUMBER_TET_FESTIVAL_R_02',name:'Lucky Red',slot:'NUMBER',collection:'TET_FESTIVAL',grade:'R'},
  {id:'NUMBER_LEGEND_OF_SAIGON_E_01',name:'Elite Purple',slot:'NUMBER',collection:'LEGEND_OF_SAIGON',grade:'E'},
  {id:'NUMBER_TET_FESTIVAL_L_01',name:'Golden Crown',slot:'NUMBER',collection:'TET_FESTIVAL',grade:'L'},
];
const slotIcons={HEADLIGHT:'💡',MIRROR:'🪞',NUMBER:'🔢'};
let gradeFilter='ALL',slotFilter='ALL';

function mkSVG(id){
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><use href="#item-${id}"/></svg>`;
}
function renderLegendary(){
  document.getElementById('legendary-grid').innerHTML=ITEMS.filter(i=>i.grade==='L').map(item=>`
    <div class="spotlight-card">
      <div class="spotlight-svg">${mkSVG(item.id)}</div>
      <div class="spotlight-name">${slotIcons[item.slot]} ${item.name}</div>
      <div class="spotlight-meta">${item.slot} · ${item.collection}</div>
    </div>`).join('');
}
function renderGrid(){
  let f=ITEMS;
  if(gradeFilter!=='ALL') f=f.filter(i=>i.grade===gradeFilter);
  if(slotFilter!=='ALL') f=f.filter(i=>i.slot===slotFilter);
  const slots=['HEADLIGHT','MIRROR','NUMBER'];
  let html='';
  (slotFilter==='ALL'?slots:[slotFilter]).forEach(slot=>{
    const slotItems=f.filter(i=>i.slot===slot);
    if(!slotItems.length) return;
    html+=`<div class="slot-divider"><strong>${slotIcons[slot]} ${slot}</strong><span class="slot-count">${slotItems.length}개</span></div>`;
    html+=`<div class="catalog-grid">`;
    html+=slotItems.map(item=>`
      <div class="item-card" data-grade="${item.grade}">
        <span class="new-badge">NEW</span>
        <div class="svg-preview">${mkSVG(item.id)}</div>
        <div class="card-info">
          <div class="card-header">
            <div>
              <div class="card-name">${slotIcons[item.slot]} ${item.name}</div>
              <div class="card-id">item-${item.id}</div>
            </div>
            <span class="grade-badge ${item.grade}">${item.grade}</span>
          </div>
          <div class="card-tags">
            <span class="tag">${item.slot}</span>
            <span class="tag">${item.collection}</span>
          </div>
        </div>
      </div>`).join('');
    html+='</div>';
  });
  document.getElementById('catalog-container').innerHTML=html;
}
function filterGrade(g){
  gradeFilter=g;
  document.querySelectorAll('#grade-filters .btn').forEach(b=>b.classList.remove('active'));
  if(g==='ALL') document.querySelector('#grade-filters .btn').classList.add('active');
  else document.querySelector(`#grade-filters [data-grade="${g}"]`).classList.add('active');
  renderGrid();
}
function filterSlot(s){
  slotFilter=s;
  document.querySelectorAll('#slot-filters .btn').forEach(b=>b.classList.remove('active'));
  if(s==='ALL') document.querySelector('#slot-filters .btn').classList.add('active');
  else document.querySelector(`#slot-filters [data-slot="${s}"]`).classList.add('active');
  renderGrid();
}
async function loadSprite(){
  try{
    const r=await fetch('saigon-rider-parts2-v5.svg');
    document.getElementById('svg-sprite').innerHTML=await r.text();
  }catch(e){console.warn('SVG load failed:',e)}
  renderLegendary();renderGrid();
}
loadSprite();
</script>
</body>
</html>
