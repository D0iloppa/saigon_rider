server {
    listen 80;
    server_name localhost;

    # Docker 내부 DNS resolver (backend / wiki profile 미사용 시에도 nginx 기동 가능)
    resolver 127.0.0.11 valid=10s;

    # Frontend — 프로덕션 빌드를 nginx가 정적 서빙
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # BFF API (backend profile로 별도 기동 시 활성화)
    location /api/ {
        set $bff_url http://bff:8080;
        proxy_pass $bff_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Console — BFF가 직접 서빙
    location /admin/ {
        set $bff_url http://bff:8080;
        proxy_pass $bff_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Engine — 내부 Docker 네트워크(172.16/12)에서만 허용, 외부 직접 접근 차단
    location /engine/ {
        allow 172.16.0.0/12;
        deny all;
        set $engine_url http://engine:8090;
        proxy_pass $engine_url/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Service-Key $http_x_service_key;
    }

    # Imgproxy - 이미지 처리
    location /img/ {
        proxy_pass http://imgproxy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Wiki (Docusaurus) ─────────────────────────────────────
    # Private 섹션: HTTP Basic Auth 적용 (더 구체적인 location이 우선)
    location /wiki/docs/private/ {
        auth_basic "Saigon Rider — Private Docs";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $wiki_url http://wiki:80;
        proxy_pass $wiki_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Public 섹션: 인증 없이 접근 가능
    location /wiki/ {
        set $wiki_url http://wiki:80;
        proxy_pass $wiki_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /wiki 트레일링 슬래시 리다이렉트
    location = /wiki {
        return 301 /wiki/;
    }
}
