<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saigon Rider — Admin · {{page_title}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #08090f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      display: flex;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 5%, rgba(255,102,51,.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 90% 90%, rgba(255,153,51,.07) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: rgba(255,255,255,.03);
      border-right: 1px solid rgba(255,255,255,.07);
      padding: 24px 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
    }

    .brand {
      padding: 4px 12px 24px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      margin-bottom: 16px;
    }
    .brand-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .08em;
      color: #fff;
    }
    .brand-name span { color: #ff6633; }
    .brand-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      background: rgba(255,102,51,.15);
      border: 1px solid rgba(255,102,51,.35);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: #ff8055;
      text-transform: uppercase;
    }

    .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      color: rgba(255,255,255,.55);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: background .15s, color .15s;
    }
    .nav a:hover { background: rgba(255,255,255,.05); color: #fff; }
    .nav a.active {
      background: rgba(255,102,51,.12);
      color: #ff8055;
      border: 1px solid rgba(255,102,51,.25);
    }
    .nav .icon { width: 18px; text-align: center; }
    .nav .nav-external {
      margin-top: 14px;
      border-top: 1px dashed rgba(255,255,255,.07);
      padding-top: 16px;
      color: rgba(255,255,255,.4);
    }

    .sidebar-footer { padding-top: 16px; border-top: 1px solid rgba(255,255,255,.07); }
    .sidebar-footer .me {
      padding: 0 14px 12px;
      font-size: 12px;
      color: rgba(255,255,255,.45);
      line-height: 1.4;
    }
    .sidebar-footer .me-name {
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .02em;
    }
    .sidebar-footer .me-role {
      display: inline-block;
      margin-top: 4px;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .12em;
      background: rgba(255,102,51,.15);
      color: #ff8055;
      border: 1px solid rgba(255,102,51,.3);
    }

    .logout-btn {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: rgba(255,255,255,.6);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background .15s, color .15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

    /* ── Main ── */
    .content {
      flex: 1;
      padding: 36px 32px 64px;
      max-width: calc(100vw - 240px);
      position: relative;
      z-index: 1;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 13px;
      color: rgba(255,255,255,.35);
      margin-bottom: 28px;
    }

    /* ── Common UI ── */
    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 20px 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: linear-gradient(135deg, #ff6633, #ff9933);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(255,102,51,.25);
      transition: opacity .15s;
    }
    .btn:hover { opacity: .92; }
    .btn.btn-ghost {
      background: rgba(255,255,255,.06);
      box-shadow: none;
      color: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.12);
    }
    .btn.btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }
    .btn.btn-danger {
      background: rgba(239,59,59,.15);
      color: #fc8181;
      border: 1px solid rgba(239,59,59,.3);
      box-shadow: none;
    }
    .btn.btn-danger:hover { background: rgba(239,59,59,.25); }
    .btn.btn-sm { padding: 5px 12px; font-size: 12px; }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .table th, .table td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .table th {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }
    .table tbody tr:hover { background: rgba(255,255,255,.025); }
    .table .thumb {
      width: 56px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: rgba(255,255,255,.05);
    }
    .table .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,.05);
    }

    .pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .pill.on { background: rgba(72,187,120,.15); color: #68d391; border: 1px solid rgba(72,187,120,.3); }
    .pill.off { background: rgba(160,174,192,.1); color: rgba(255,255,255,.4); border: 1px solid rgba(255,255,255,.1); }
    .pill.warn { background: rgba(255,153,51,.12); color: #ff9933; border: 1px solid rgba(255,153,51,.3); }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .toolbar form { display: flex; gap: 8px; align-items: center; }

    input[type="text"], input[type="number"], input[type="datetime-local"], input[type="search"], input[type="password"], select, textarea {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 9px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color .15s, background .15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(255,102,51,.6);
      background: rgba(255,255,255,.08);
    }
    textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-bottom: 7px;
    }
    .field { margin-bottom: 18px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    .pagination {
      display: flex;
      gap: 6px;
      margin-top: 20px;
      justify-content: center;
    }
    .pagination a, .pagination span {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
    }
    .pagination a:hover { background: rgba(255,255,255,.08); color: #fff; }
    .pagination .current { background: rgba(255,102,51,.15); color: #ff8055; border-color: rgba(255,102,51,.3); }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,.3);
      font-size: 13px;
    }

    .breadcrumb {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      color: rgba(255,255,255,.35);
      margin-bottom: 12px;
    }
    .breadcrumb a { color: rgba(255,255,255,.5); text-decoration: none; }
    .breadcrumb a:hover { color: #fff; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-name">SAIGON <span>RIDER</span></div>
      <div><span class="brand-badge">Admin</span></div>
    </div>

    <nav class="nav">
      <a href="/admin/dashboard" class="{{nav_dashboard}}"><span class="icon">▣</span> 대시보드</a>
      <a href="/admin/quests" class="{{nav_quests}}"><span class="icon">◈</span> 퀘스트 관리</a>
      <a href="/admin/feed" class="{{nav_feed}}"><span class="icon">▤</span> 피드 관리</a>
      <a href="/admin/users" class="{{nav_users}}"><span class="icon">◉</span> 유저 관리</a>
      {{admins_menu}}
      <a href="/admin/sre/ops" class="{{nav_sre}}"><span class="icon">⬡</span> SRE 운영</a>
      <a href="/admin/badges" class="{{nav_badges}}"><span class="icon">★</span> 배지 관리</a>
      <a href="/admin/sre/items" class="{{nav_items}}"><span class="icon">◈</span> 아이템 관리</a>
      <a href="/admin/dev" class="{{nav_dev}}"><span class="icon">⟐</span> DEV Context</a>
      <a href="/admin/settings" class="{{nav_settings}}"><span class="icon">⚙</span> 설정</a>

      <a href="{{wiki_url}}" target="_blank" rel="noopener" class="nav-external">
        <span class="icon">↗</span> 개발자 위키
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="me">
        <div class="me-name">{{admin_username}}</div>
        <div class="me-role">{{admin_role}}</div>
      </div>
      <form action="/admin/logout" method="post">
        <button class="logout-btn" type="submit">로그아웃</button>
      </form>
    </div>
  </aside>

  <main class="content">
    {{body}}
  </main>
</body>
</html>
