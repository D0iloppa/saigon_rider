# =============================================================
# Saigon Rider — 호스트 nginx 라우팅 (saigon-rider.com)
# 설치: sudo cp deploy/saigon-rider.conf /etc/nginx/conf.d/saigon-rider.conf
#
# saigon-rider.com + www 를 컨테이너 nginx(127.0.0.1:18090)로 라우팅한다.
# 경로 기반 라우팅(/api/bff, /admin 등)이므로 호스트는 apex+www 둘뿐.
# 인증서: certbot nginx 플러그인(HTTP-01)으로 발급한 saigon-rider.com cert
#         (SAN 에 root+www 포함). 갱신은 deploy/renew-certs.sh + cron.
# 주의: 본 conf 의 443 블록은 인증서가 존재해야 nginx -t 통과 →
#       반드시 certbot 발급(certonly --nginx) 이후에 설치할 것.
# =============================================================

# HTTP → HTTPS (+ certbot acme-challenge 웹루트 보존: 갱신 폴백용)
server {
    listen 80;
    server_name saigon-rider.com www.saigon-rider.com;

    location ^~ /.well-known/acme-challenge/ {
        root /app/nginx/;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name saigon-rider.com www.saigon-rider.com;

    ssl_certificate     /etc/letsencrypt/live/saigon-rider.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saigon-rider.com/privkey.pem;

    # 컨테이너 nginx 와 동일 (업로드 413 방지)
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:18090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # https 스킴 전달
        proxy_http_version 1.1;
        proxy_set_header Connection "";                # upstream keepalive
        proxy_buffering off;                           # SSE/스트리밍(가챠) 지연 방지
        proxy_read_timeout 300s;
    }
}
