<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Saigon Rider</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Zapier token system */
  --primary:      #ff4f00;
  --on-primary:   #fffefb;
  --ink:          #201515;
  --ink-soft:     #2f2a26;
  --ink-mid:      #36342e;
  --body:         #605d52;
  --body-mid:     #939084;
  --mute:         #c5c0b1;
  --canvas:       #fffefb;
  --canvas-soft:  #f8f4f0;

  /* hero / dark bands — match logo background exactly */
  --dark:         #181110;
  --dark-card:    #231a16;
  --dark-border:  rgba(255,254,251,0.1);
  --dark-body:    rgba(255,254,251,0.6);

  --radius:  12px;
  --radius-sm: 6px;

  --f: "Inter", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, sans-serif;

  --container: min(1200px, 100%);
  --px: clamp(1.25rem, 5vw, 5rem);
}

body {
  background: var(--canvas);
  color: var(--ink);
  font-family: var(--f);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px;
  background: rgba(24,17,16,0.94);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--dark-border);
  display: flex; align-items: center;
  padding: 0 var(--px); gap: 2rem;
}
.nav-brand {
  display: flex; align-items: center; gap: 0.6rem;
  text-decoration: none; flex-shrink: 0;
}
.nav-brand-logo {
  width: 30px; height: 30px;
  object-fit: cover; border-radius: 7px; flex-shrink: 0;
}
.nav-brand-name {
  font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--on-primary);
}
.nav-brand-name b { color: var(--primary); font-weight: 700; }
.nav-links {
  display: flex; gap: 1.5rem; list-style: none; flex: 1;
}
.nav-links a {
  font-size: 0.85rem; font-weight: 400;
  text-decoration: none; color: var(--dark-body);
  transition: color 0.15s;
}
.nav-links a:hover { color: var(--on-primary); }
.nav-right { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; flex-shrink: 0; }

.lang-sw { display: flex; gap: 2px; }
.lang-sw button {
  background: none; border: 1px solid var(--dark-border);
  border-radius: var(--radius-sm);
  padding: 5px 10px; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.06em; color: var(--dark-body);
  cursor: pointer; font-family: var(--f);
  transition: all 0.15s;
}
.lang-sw button:hover { color: var(--on-primary); border-color: rgba(255,254,251,0.3); }
.lang-sw button.active {
  background: var(--primary); border-color: var(--primary); color: #fff;
}

.nav-cta {
  background: var(--primary); color: #fff; border: none;
  padding: 8px 18px; font-size: 0.85rem; font-weight: 600;
  font-family: var(--f); border-radius: var(--radius);
  cursor: pointer; text-decoration: none; transition: opacity 0.15s;
  white-space: nowrap;
}
.nav-cta:hover { opacity: 0.9; }

/* ── HERO ── */
.hero {
  background: var(--dark);
  min-height: 100svh;
  padding: 60px var(--px) 0;
  display: grid; grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: clamp(2rem, 6vw, 6rem);
  position: relative; overflow: hidden;
}
.hero-content { padding-bottom: 6rem; }
.hero-eyebrow {
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--primary); margin-bottom: 1.25rem;
}
.hero h1 {
  font-size: clamp(2.5rem, 5vw, 4.25rem);
  font-weight: 600; line-height: 1.08;
  letter-spacing: -0.02em; color: var(--on-primary);
  text-wrap: balance; margin-bottom: 1.25rem;
}
.hero-sub {
  font-size: clamp(0.95rem, 1.4vw, 1.05rem);
  color: var(--dark-body); line-height: 1.8;
  max-width: 44ch; margin-bottom: 2.25rem;
}
.hero-sub strong { color: rgba(255,254,251,0.85); font-weight: 500; }
.hero-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
.btn-dl {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 12px 22px; border-radius: var(--radius);
  font-size: 0.88rem; font-weight: 600;
  font-family: var(--f); text-decoration: none;
  transition: opacity 0.15s; cursor: pointer;
}
.btn-dl.primary { background: var(--primary); color: #fff; border: none; }
.btn-dl.secondary {
  background: transparent; color: var(--on-primary);
  border: 1px solid rgba(255,254,251,0.22);
}
.btn-dl:hover { opacity: 0.85; }
.btn-dl .lbl { display: flex; flex-direction: column; line-height: 1.25; }
.btn-dl .lbl small { font-size: 0.65rem; font-weight: 400; opacity: 0.7; letter-spacing: 0.02em; }
.hero-stats {
  display: flex; gap: 2.25rem;
  padding-top: 1.75rem;
  border-top: 1px solid var(--dark-border);
}
.hstat { }
.hstat-val {
  font-size: 1.75rem; font-weight: 700; color: var(--on-primary);
  letter-spacing: -0.02em; line-height: 1;
}
.hstat-val b { color: var(--primary); font-weight: 700; }
.hstat-label {
  font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--dark-body); margin-top: 0.25rem;
}

.hero-visual {
  display: flex; justify-content: center; align-items: flex-end;
  padding-bottom: 4rem;
}
.phone-frame {
  width: min(260px, 75vw);
  background: #251d1a;
  border: 2px solid rgba(255,254,251,0.12);
  border-radius: 40px;
  padding: 12px 12px 18px;
  box-shadow: 0 60px 120px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.3);
  position: relative;
}
.phone-notch {
  width: 72px; height: 5px; background: rgba(255,254,251,0.1);
  border-radius: 3px; margin: 0 auto 10px;
}
.phone-frame img {
  width: 100%; display: block; border-radius: 28px;
  transition: opacity 0.2s ease;
}

/* ── SECTIONS ── */
.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--px);
}

.eyebrow {
  display: inline-block;
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink); margin-bottom: 1rem;
}
.eyebrow.light { color: var(--primary); }

h2 {
  font-size: clamp(1.8rem, 3.2vw, 3rem);
  font-weight: 600; line-height: 1.1;
  letter-spacing: -0.02em; text-wrap: balance;
  color: var(--ink); margin-bottom: 1rem;
}
h2.light { color: var(--on-primary); }

/* ── MAP SECTION ── */
.sec-map {
  background: var(--canvas-soft);
  padding: clamp(5rem, 9vw, 9rem) var(--px);
}
.sec-map-inner {
  max-width: var(--container); margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: clamp(3rem, 6vw, 8rem); align-items: center;
}
.map-phone { display: flex; justify-content: center; }
.map-frame {
  width: min(240px, 70vw);
  background: #fff;
  border: 1px solid var(--mute);
  border-radius: 40px;
  padding: 12px 12px 18px;
  box-shadow: 0 24px 48px rgba(32,21,21,0.1);
  position: relative;
}
.map-frame .phone-notch { background: var(--mute); }
.map-frame img { width: 100%; display: block; border-radius: 28px; }

.map-text p {
  font-size: 1rem; color: var(--body);
  line-height: 1.8; max-width: 44ch; margin-bottom: 2rem;
}
.bullets { list-style: none; display: flex; flex-direction: column; gap: 1.25rem; }
.bullets li {
  display: flex; align-items: flex-start; gap: 1rem;
  font-size: 0.95rem; color: var(--ink-mid);
}
.bull-dot {
  flex-shrink: 0; margin-top: 0.45rem;
  width: 8px; height: 8px; border-radius: 2px;
  background: var(--primary);
}
.bull-tx b { display: block; font-weight: 600; color: var(--ink); margin-bottom: 0.15rem; }
.bull-tx small { font-size: 0.82rem; color: var(--body-mid); line-height: 1.6; }

/* ── HOW IT WORKS ── */
.sec-how {
  background: var(--canvas);
  padding: clamp(5rem, 9vw, 9rem) var(--px);
  text-align: center;
}
.sec-how h2 { margin-bottom: 3.5rem; }
.steps {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem; max-width: 900px; margin: 0 auto;
}
.step-card {
  background: var(--canvas-soft);
  border-radius: var(--radius);
  padding: 2rem 1.75rem;
  text-align: left;
  position: relative; overflow: hidden;
}
.step-n {
  font-size: 4.5rem; font-weight: 800;
  line-height: 1; letter-spacing: -0.03em;
  color: rgba(32,21,21,0.06);
  margin-bottom: 1rem;
  user-select: none;
}
.step-card h3 {
  font-size: 1.05rem; font-weight: 600;
  color: var(--ink); margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
}
.step-card p {
  font-size: 0.88rem; color: var(--body);
  line-height: 1.7;
}
.step-tag {
  display: inline-block;
  background: var(--primary); color: #fff;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em;
  padding: 3px 8px; border-radius: var(--radius-sm);
  margin-bottom: 1rem;
  text-transform: uppercase;
}

/* ── TRUST ── */
.sec-trust {
  background: var(--dark);
  padding: clamp(5rem, 9vw, 9rem) var(--px);
  text-align: center;
}
.sec-trust h2 { color: var(--on-primary); margin-bottom: 0.75rem; }
.sec-trust .sub {
  font-size: 1rem; color: var(--dark-body);
  max-width: 46ch; margin: 0 auto 3rem; line-height: 1.8;
}
.rating-box {
  display: inline-flex; flex-direction: column; align-items: center;
  background: var(--dark-card); border: 1px solid var(--dark-border);
  border-radius: var(--radius); padding: 2rem 3rem; gap: 0.35rem;
  margin-bottom: 3.5rem;
}
.rating-stars { color: var(--primary); font-size: 1.5rem; letter-spacing: 0.08em; }
.rating-num {
  font-size: 3.5rem; font-weight: 700;
  color: var(--on-primary); line-height: 1; letter-spacing: -0.03em;
}
.rating-meta {
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,254,251,0.4);
}
.trust-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem; max-width: 760px; margin: 0 auto;
}
.trust-item {
  background: var(--dark-card);
  border: 1px solid var(--dark-border);
  border-radius: var(--radius);
  padding: 1.5rem 1.25rem; text-align: left;
}
.trust-item h4 {
  font-size: 0.9rem; font-weight: 600; color: var(--on-primary);
  margin-bottom: 0.4rem; letter-spacing: -0.01em;
}
.trust-item p { font-size: 0.82rem; color: var(--dark-body); line-height: 1.65; }

/* ── CTA ── */
.sec-cta {
  background: var(--canvas-soft);
  padding: clamp(5rem, 9vw, 9rem) var(--px);
  text-align: center;
}
.sec-cta h2 { margin-bottom: 0.75rem; }
.sec-cta p { color: var(--body); font-size: 1rem; max-width: 44ch; margin: 0 auto 2.25rem; line-height: 1.8; }
.cta-btns { display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }
.btn-ink {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 12px 22px; border-radius: var(--radius);
  font-size: 0.88rem; font-weight: 600;
  font-family: var(--f); text-decoration: none;
  transition: opacity 0.15s; background: var(--ink); color: var(--on-primary);
}
.btn-ink:hover { opacity: 0.85; }
.btn-orange {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 12px 22px; border-radius: var(--radius);
  font-size: 0.88rem; font-weight: 600;
  font-family: var(--f); text-decoration: none;
  transition: opacity 0.15s; background: var(--primary); color: #fff;
}
.btn-orange:hover { opacity: 0.9; }
.btn-lbl { display: flex; flex-direction: column; line-height: 1.25; }
.btn-lbl small { font-size: 0.65rem; font-weight: 400; opacity: 0.7; }

/* ── FOOTER ── */
footer {
  background: var(--ink);
  padding: 3rem var(--px) 2.5rem;
}
.footer-inner {
  max-width: var(--container); margin: 0 auto;
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 2rem;
}
.foot-brand { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; }
.foot-brand img { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; }
.foot-brand-name {
  font-size: 0.88rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--on-primary);
}
.foot-brand-name b { color: var(--primary); }
.footer-copy { font-size: 0.78rem; color: var(--mute); line-height: 1.7; }
.footer-copy a { color: var(--body-mid); text-decoration: none; }
.footer-copy a:hover { color: var(--on-primary); }

/* ── RESPONSIVE ── */
@media (max-width: 820px) {
  .hero {
    grid-template-columns: 1fr; min-height: auto;
    text-align: center; padding-bottom: 5rem; gap: 3rem; padding-top: 80px;
  }
  .hero::after { display: none; }
  .hero-eyebrow, .hero-sub { margin-left: auto; margin-right: auto; }
  .hero-actions { justify-content: center; }
  .hero-stats { justify-content: center; }
  .hero-visual { padding-bottom: 0; order: -1; }
  .sec-map-inner { grid-template-columns: 1fr; gap: 2.5rem; }
  .steps { grid-template-columns: 1fr; max-width: 400px; }
  .trust-grid { grid-template-columns: 1fr; max-width: 380px; }
  .nav-links { display: none; }
}
@media (max-width: 480px) {
  .nav-brand-name { display: none; }
}
</style>
</head>

<script>
const T = {
  kr: {
    nav_map:       "지도 탐색",
    nav_how:       "이용 방법",
    nav_trust:     "평점 시스템",
    nav_cta:       "앱 다운로드",
    hero_eyebrow:  "호치민 오토바이 부품·용품 직거래",
    hero_h1:       "지도에서 찾고,<br>직접 만나서<br>거래한다",
    hero_sub:      "내 주변 <strong>구(區)별 매물을 지도로 탐색</strong>하고 판매자에게 직접 연락하세요. 배송 없이, 가까운 곳에서 바로 만납니다.",
    store_app_pre: "Download on the",

function setLang(lang) {
  const t = T[lang];
  ['vn','en','kr'].forEach(l => {
    document.getElementById('btn-' + l).classList.toggle('active', l === lang);
  });
  document.documentElement.lang = lang === 'kr' ? 'ko' : lang === 'vn' ? 'vi' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  const img = document.getElementById('home-screenshot');
  img.style.opacity = '0';
  setTimeout(() => { img.src = t.screenshot; img.style.opacity = '1'; }, 180);
}

setLang('kr');
