<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dev Test — Saigon Rider</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--bg:#0F0E17;--surface:#1A1925;--surface-2:#232232;--line:rgba(255,255,255,.08);--text:#F0EDE8;--text-2:#A89F96;--text-3:#6B6478;--brand:#FF5A1F;--font-ui:'Pretendard','Apple SD Gothic Neo',sans-serif;--font-mono:'Space Grotesk',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;display:flex;justify-content:center;padding:48px 20px}
.wrap{width:100%;max-width:480px}
h1{font-family:var(--font-mono);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.brand{color:var(--brand)}
.desc{font-size:13px;color:var(--text-3);margin-bottom:32px;line-height:1.5}
.list{display:flex;flex-direction:column;gap:8px}
.card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;text-decoration:none;color:var(--text);transition:border-color .2s,background .2s}
.card:hover{border-color:var(--brand);background:var(--surface-2)}
.card-icon{width:44px;height:44px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card:hover .card-icon{background:rgba(255,90,31,.1)}
.card-body{flex:1;min-width:0}
.card-name{font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:.5px}
.card-path{font-size:11px;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}
.empty{text-align:center;color:var(--text-3);font-size:13px;padding:40px 0}
.loading{text-align:center;color:var(--text-3);font-size:13px;padding:40px 0}
.ts{margin-top:40px;text-align:center;font-size:10px;color:var(--text-3);font-family:var(--font-mono)}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="brand">DEV</span> TEST</h1>
  <p class="desc">디자인 시안 &amp; 프로토타입 — 프론트엔드 빌드와 무관한 정적 HTML 페이지</p>
  <div class="list" id="list">
    <div class="loading">scanning...</div>
  </div>
  <div class="ts" id="ts"></div>
</div>
<script>
const ICONS = {
  'item-catalog': '🎨',
  'equip-preview': '🧑',
};
const DEFAULT_ICON = '📄';

fetch('/dev-test/.ls/')
  .then(r => r.json())
  .then(entries => {
    const dirs = entries.filter(e => e.type === 'directory');
    const el = document.getElementById('list');
    if (!dirs.length) {
      el.innerHTML = '<div class="empty">시안 없음</div>';
      return;
    }
    el.innerHTML = dirs.map(d => {
      const name = d.name.replace(/\/$/, '');
      const icon = ICONS[name] || DEFAULT_ICON;
      return `<a class="card" href="/dev-test/${name}/">
        <div class="card-icon">${icon}</div>
        <div class="card-body">
          <div class="card-name">${name}</div>
          <div class="card-path">/dev-test/${name}/</div>
        </div>
      </a>`;
    }).join('');
    document.getElementById('ts').textContent = 'scanned ' + dirs.length + ' items';
  })
  .catch(() => {
    document.getElementById('list').innerHTML =
      '<div class="empty">목록을 불러올 수 없습니다</div>';
  });
</script>
</body>
</html>
