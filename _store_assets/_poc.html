<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;800&family=Be+Vietnam+Pro:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1290px; height:2796px; }
  .frame{
    width:1290px;height:2796px;position:relative;overflow:hidden;
    /* unified Saigon-night background */
    background:
      radial-gradient(120% 80% at 75% 100%, rgba(255,90,31,.55) 0%, rgba(255,90,31,0) 55%),
      radial-gradient(80% 50% at 10% 15%, rgba(0,240,255,.18) 0%, rgba(0,240,255,0) 60%),
      radial-gradient(70% 45% at 95% 30%, rgba(255,45,156,.16) 0%, rgba(255,45,156,0) 60%),
      linear-gradient(165deg,#11131C 0%,#08090F 60%,#1A1D2A 100%);
  }
  .headline{
    position:absolute;top:150px;left:0;right:0;text-align:center;padding:0 90px;
    font-family:'Noto Sans KR',sans-serif;font-weight:800;color:#fff;
    font-size:96px;line-height:1.15;letter-spacing:-1px;
    text-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  .sub{
    position:absolute;top:430px;left:0;right:0;text-align:center;
    font-family:'Be Vietnam Pro',sans-serif;font-weight:600;
    color:#FFB800;font-size:48px;
  }
  .phone{
    position:absolute;left:50%;bottom:-60px;transform:translateX(-50%);
    width:880px;height:1900px;border-radius:90px;
    background:#000;padding:22px;
    box-shadow:0 60px 120px rgba(0,0,0,.6), 0 0 0 4px rgba(255,255,255,.06);
  }
  .screen{
    width:100%;height:100%;border-radius:70px;overflow:hidden;
    background:linear-gradient(180deg,#F7F5F0,#FAF7F2);
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Sans KR';color:#8A8E9E;font-size:40px;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="headline">사이공 전역이 퀘스트 맵</div>
    <div class="sub">Cả Sài Gòn là bản đồ nhiệm vụ</div>
    <div class="phone"><div class="screen">[ SCREENSHOT ]</div></div>
  </div>
</body>
</html>
