<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>

<title>Saigon Rider — Effects Catalog (B6)</title>
<style>
:root{
  --bg:#0A0A0F;--surface:#0F0E1A;--surface2:#16152A;--border:rgba(255,255,255,0.06);
  --text:#F0EEF8;--muted:#6B6A80;
  --col-c:#6B7280;--col-r:#3B82F6;--col-e:#8B5CF6;--col-l:#FFB800;--col-m:#FF2D9C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh;}
.page-header{padding:40px 48px 28px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(0,240,255,.07) 0%,transparent 100%);}
.page-header h1{font-size:28px;font-weight:700;letter-spacing:-.02em;}
.page-header h1 span{color:#00F0FF;}
.batch-meta{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;}
.batch-meta .chip{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;}
/* Mythic Spotlight */
.mythic-section{padding:28px 48px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(255,45,156,.04),transparent);}
.mythic-section h2{font-size:14px;font-weight:600;color:#FF2D9C;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;}
.mythic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.mythic-card{background:var(--surface2);border:1px solid rgba(255,45,156,.3);border-radius:10px;overflow:hidden;position:relative;}
.mythic-card::before{content:'★ MYTHIC';position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;color:#FF2D9C;letter-spacing:.06em;z-index:1;}
.mythic-thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%,rgba(255,45,156,.12),transparent 70%);}
.mythic-thumb svg{width:90%;height:90%;}
.mythic-label{padding:8px;text-align:center;font-size:10px;color:#FF2D9C;font-weight:600;}
/* Controls */
.controls{padding:20px 48px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);align-items:center;}
.filter-label{font-size:11px;color:var(--muted);align-self:center;margin-right:4px;}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.15s;}
.filter-btn:hover{border-color:#00F0FF;color:var(--text);}
.filter-btn.active{border-color:#00F0FF;background:rgba(0,240,255,.12);color:#67E8F9;}
/* Grid */
.grid-wrap{max-width:1400px;margin:0 auto;padding:28px 48px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;}
.card:hover{transform:translateY(-3px);}
.card[data-rarity="M"]{border-color:rgba(255,45,156,.3);}
.card[data-rarity="L"]{border-color:rgba(255,184,0,.2);}
.card[data-rarity="E"]{border-color:rgba(139,92,246,.2);}
.card[data-rarity="R"]{border-color:rgba(59,130,246,.15);}
.card-preview{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--surface2);position:relative;overflow:hidden;}
.card-preview svg{width:88%;height:88%;}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px 4px;}
.card-name{font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78%;}
.grade-chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.gc-C{background:rgba(107,114,128,.2);color:#9CA3AF;}
.gc-R{background:rgba(59,130,246,.2);color:#93C5FD;}
.gc-E{background:rgba(139,92,246,.2);color:#C4B5FD;}
.gc-L{background:rgba(255,184,0,.15);color:#FFB800;}
.gc-M{background:rgba(255,45,156,.15);color:#FF2D9C;}
.card-slot{font-size:9px;color:var(--muted);padding:2px 10px 8px;}
.card-meta{padding:0 10px 8px;display:flex;gap:5px;align-items:center;}
.badge-new{font-size:8px;font-weight:700;background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.3);border-radius:4px;padding:1px 5px;}
.badge-v5{font-size:8px;font-weight:700;background:rgba(251,191,36,.12);color:#FBBF24;border:1px solid rgba(251,191,36,.25);border-radius:4px;padding:1px 5px;}
/* Footer */
.stats-footer{padding:24px 48px;border-top:1px solid var(--border);display:flex;gap:24px;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-val{font-size:22px;font-weight:700;color:#00F0FF;}
.stat-key{font-size:10px;color:var(--muted);margin-top:2px;}
</style>
</head>

const RARITY_LABEL = {C:'COMMON',R:'RARE',E:'EPIC',L:'LEGENDARY',M:'MYTHIC'};
let activeSlot='ALL', activeRarity='ALL';

function buildCard(item){
  return `<div class="card" data-slot="${item.slot}" data-rarity="${item.rarity}">
    <div class="card-preview">
      <svg viewBox="0 0 200 200"><use href="#item-${item.id}"/></svg>
    </div>
    <div class="card-row">
      <div class="card-name" title="${item.id}">${item.id}</div>
      <span class="grade-chip gc-${item.rarity}">${item.rarity}</span>
    </div>
    <div class="card-slot">${item.slot} · ${item.collection}</div>
    <div class="card-meta"><span class="badge-new">NEW</span></div>
  </div>`;
}

function render(){
  document.getElementById('card-grid').innerHTML = ITEMS
    .filter(i=>(activeSlot==='ALL'||i.slot===activeSlot)&&(activeRarity==='ALL'||i.rarity===activeRarity))
    .map(buildCard).join('');
}

function filterSlot(s,el){
  activeSlot=s;
  document.querySelectorAll('.controls .filter-group').forEach((g,gi)=>{ if(gi===0) g.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); });
  el.classList.add('active'); render();
}
function filterRarity(r,el){
  activeRarity=r;
  document.querySelectorAll('.controls .filter-group').forEach((g,gi)=>{ if(gi===1) g.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); });
  el.classList.add('active'); render();
}

render();
</script>
