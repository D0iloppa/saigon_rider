networks:
  dev-net:
    driver: bridge
    name: ${NETWORK_BRIDGE}

services:

  # ── Nginx (Reverse Proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: saigon_nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - dev-net
    depends_on:
      - frontend
      - imgproxy
    restart: unless-stopped

  # ── Frontend (Vue 3 + Vite) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: saigon_frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - dev-net
    environment:
      - VITE_USE_MOCK=${VITE_USE_MOCK:-true}
      - VITE_API_BASE=${VITE_API_BASE}
    restart: unless-stopped

  # ── Imgproxy (Image Processing) ───────────────────────────
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: saigon_imgproxy
    volumes:
      - ./contents:/data:ro
    networks:
      - dev-net
    environment:
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/data
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
      - IMGPROXY_MAX_SRC_RESOLUTION=50
      - IMGPROXY_ALLOWED_SOURCES=local://
    restart: unless-stopped

  # ── Backend (Spring Boot) ─────────────────────────────────
  # docker compose --profile backend up
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: saigon_backend
    profiles: [backend]
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    networks:
      - dev-net
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=dev
    restart: unless-stopped

  # ── Database (PostgreSQL + PostGIS) ───────────────────────
  # docker compose --profile backend up
  database:
    image: postgis/postgis:15-3.3
    container_name: saigon_db
    profiles: [backend]
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dev-net
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
