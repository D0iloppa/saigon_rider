<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saigon Rider - App Support</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            color: #6e6e73;
            margin-bottom: 20px;
        }

        .support-form {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #0056cc;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .required {
            color: #ff3b30;
        }

        .form-info {
            background-color: #f2f2f7;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .form-info p {
            font-size: 14px;
            color: #6e6e73;
            margin: 0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .support-form {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Saigon Rider App Support</h1>
            <p>Need help? We're here to assist you with any questions or issues.</p>
        </div>

        <div class="support-form">
            <div class="form-info">
                <p>Please fill out the form below and we'll get back to you as soon as possible. All fields marked with <span class="required">*</span> are required.</p>
            </div>

            <form id="supportForm">
                <div class="form-group">
                    <label for="subject">Subject <span class="required">*</span></label>
                    <input type="text" id="subject" name="subject" required placeholder="Brief description of your issue">
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" name="message" required placeholder="Please describe your issue in detail..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Form submission handler
            $('#supportForm').on('submit', function(e) {
                e.preventDefault();
                
                // Get form data
                const formData = {
                    subject: $('#subject').val(),
                    email: $('#email').val(),
                    message: $('#message').val()
                };
                
                // Basic validation
                if (!formData.subject || !formData.email || !formData.message) {
                    alert('Please fill in all required fields.');
                    return;
                }
                
                // Email validation
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(formData.email)) {
                    alert('Please enter a valid email address.');
                    return;
                }
                
                // TODO: Add form submission logic here
                // Example: $.post('/api/support', formData, function(response) { ... });
                
                console.log('Form Data:', formData);
                alert('Thank you for your message! We will get back to you soon.');
                
                // Reset form
                this.reset();
            });
            
            // Add some interactive effects
            $('input, textarea').on('focus', function() {
                $(this).parent().addClass('focused');
            });
            
            $('input, textarea').on('blur', function() {
                $(this).parent().removeClass('focused');
            });
        });
    </script>
</body>
</html>
