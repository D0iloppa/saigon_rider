server {
    listen 80;
    server_name localhost;

    # Docker 내부 DNS resolver (backend profile 미사용 시에도 nginx 기동 가능)
    resolver 127.0.0.11 valid=10s;

    # Frontend — 프로덕션 빌드를 nginx가 정적 서빙
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend API (backend profile로 별도 기동 시 활성화)
    location /api/ {
        set $backend_url http://backend:8080;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Console — 백엔드가 직접 서빙
    location /admin/ {
        set $backend_url http://backend:8080;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Imgproxy - 이미지 처리
    location /img/ {
        proxy_pass http://imgproxy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
