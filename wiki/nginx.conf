server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Docusaurus 빌드 출력은 /wiki/ baseUrl 기준으로 /usr/share/nginx/html/wiki/ 에 위치
    location /wiki/ {
        try_files $uri $uri/ $uri/index.html /wiki/index.html;
    }

    # /wiki 요청을 /wiki/ 로 리다이렉트
    location = /wiki {
        return 301 /wiki/;
    }

    # 루트 요청 차단 (wiki 컨테이너는 /wiki/ 만 서빙)
    location / {
        return 404;
    }
}
