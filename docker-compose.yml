networks:
  dev-net:
    driver: bridge
    name: ${NETWORK_BRIDGE}

volumes:
  saigon_db_data:

services:

  # ── Nginx (Reverse Proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: saigon_nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - dev-net
    depends_on:
      - frontend
      - imgproxy
    restart: unless-stopped

  # ── Frontend (React + Vite → nginx 정적 서빙) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saigon_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - dev-net
    restart: unless-stopped

  # ── Imgproxy (Image Processing) ───────────────────────────
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: saigon_imgproxy
    volumes:
      - ./contents:/data:ro
    networks:
      - dev-net
    environment:
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/data
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
      - IMGPROXY_MAX_SRC_RESOLUTION=50
      - IMGPROXY_ALLOWED_SOURCES=local://
    restart: unless-stopped

  # ── Backend (FastAPI) ─────────────────────────────────────
  # docker compose --profile backend up
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saigon_backend
    profiles: [backend]
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./backend:/app
      - ./contents:/data
    networks:
      - dev-net
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - CONTENTS_BASE_PATH=/data
      - IMGPROXY_BASE_URL=${IMGPROXY_BASE_URL}
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
    restart: unless-stopped

  # ── Database (PostgreSQL + PostGIS) ───────────────────────
  # docker compose --profile backend up
  database:
    image: postgis/postgis:15-3.3
    container_name: saigon_db
    profiles: [backend]
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - saigon_db_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dev-net
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
