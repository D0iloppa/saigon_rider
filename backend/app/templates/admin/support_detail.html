<style>
  .ticket-meta {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .ticket-meta h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .ticket-meta .meta-row {
    display: flex; gap: 16px; font-size: 12px;
    color: rgba(255,255,255,.45); margin-bottom: 12px;
  }
  .ticket-body {
    font-size: 14px; line-height: 1.7;
    color: rgba(255,255,255,.85);
    white-space: pre-wrap; word-break: break-word;
  }
  .reply-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .reply-item {
    padding: 14px 18px;
    border-radius: 10px;
    max-width: 80%;
    line-height: 1.6;
    font-size: 14px;
  }
  .reply-user { background: rgba(255,255,255,.06); align-self: flex-start; }
  .reply-admin { background: rgba(255,165,0,.12); border: 1px solid rgba(255,165,0,.25); align-self: flex-end; }
  .reply-meta { font-size: 11px; color: rgba(255,255,255,.4); margin-bottom: 4px; display: flex; gap: 8px; }
  .reply-body { white-space: pre-wrap; word-break: break-word; }
  .reply-form {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .reply-form h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: rgba(255,255,255,.8); }
  .reply-form textarea {
    width: 100%; height: 100px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px;
    color: #fff; font-size: 14px;
    padding: 10px 14px; resize: vertical;
    box-sizing: border-box;
  }
  .reply-form textarea:focus { outline: none; border-color: rgba(255,165,0,.5); }
  .status-form {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 16px 24px;
  }
  .status-form label { font-size: 13px; color: rgba(255,255,255,.6); }
  .status-form select {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 8px; color: #fff;
    padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
</style>

{{flash_html}}

<div class="toolbar">
  <div>
    <a href="/admin/support" style="color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;">← 목록으로</a>
    <p class="page-title" style="margin-top:6px;">{{ticket_title}}</p>
    <p class="page-sub">유저: {{user_nick}} · 등록: {{ticket_created}}</p>
  </div>
</div>

<div class="ticket-meta">
  <h2>{{ticket_title}}</h2>
  <div class="meta-row">
    <span>유저: {{user_nick}}</span>
    <span>등록: {{ticket_created}}</span>
  </div>
  <div class="ticket-body">{{ticket_body}}</div>
</div>

<h3 style="font-size:14px;font-weight:700;margin-bottom:12px;">답변 스레드</h3>
<div class="reply-list">
  {{replies_html}}
</div>

<div class="reply-form">
  <h3>답변 등록</h3>
  <form method="post" action="/admin/support/{{ticket_id}}/reply">
    <textarea name="reply_body" placeholder="답변 내용을 입력하세요…"></textarea>
    <div style="margin-top:10px;display:flex;justify-content:flex-end;">
      <button type="submit" class="btn">답변 등록</button>
    </div>
  </form>
</div>

<div class="status-form">
  <label>상태 변경</label>
  <form method="post" action="/admin/support/{{ticket_id}}/status" style="display:flex;gap:8px;align-items:center;">
    <select name="new_status">
      {{status_options}}
    </select>
    <button type="submit" class="btn btn-sm">변경</button>
  </form>
</div>
