<div class="toolbar">
  <div>
    <h1 class="page-title">보상 정책 관리</h1>
    <p class="page-sub">정책 · 조건 · 액션 — 총 <strong id="policyCount">0</strong>개</p>
  </div>
  <button class="btn" onclick="openModal()">+ 새 정책</button>
</div>

<div class="card" style="overflow-x:auto;">
  <table class="table" id="policyTable">
    <thead>
      <tr>
        <th>코드</th>
        <th>이름</th>
        <th>조건 요약</th>
        <th>액션</th>
        <th>우선순위</th>
        <th>반복</th>
        <th>상태</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="policyBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none;">등록된 정책이 없습니다</div>
</div>

<!-- ── Modal ── -->
<div id="policyModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);overflow-y:auto;">
  <div style="max-width:680px;margin:48px auto;background:#12141c;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px 32px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 id="modalTitle" style="font-size:18px;font-weight:700;color:#fff;">새 정책 등록</h2>
      <button onclick="closeModal()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer;">&times;</button>
    </div>
    <input type="hidden" id="editId" value="">

    <div class="field-row">
      <div class="field">
        <label class="field-label">정책 코드</label>
        <input type="text" id="fCode" style="width:100%" placeholder="MILEAGE_100KM">
      </div>
      <div class="field">
        <label class="field-label">이름</label>
        <input type="text" id="fName" style="width:100%" placeholder="100km 달성 보상">
      </div>
    </div>

    <div class="field">
      <label class="field-label">설명</label>
      <textarea id="fDesc" style="width:100%" placeholder="누적 100km 달성 시 XP 지급"></textarea>
    </div>

    <div class="field-row-3">
      <div class="field">
        <label class="field-label">우선순위</label>
        <input type="number" id="fPriority" style="width:100%" value="10">
      </div>
      <div class="field">
        <label class="field-label">반복 가능</label>
        <select id="fRepeatable" style="width:100%" onchange="toggleRepeat()">
          <option value="0">1회성</option>
          <option value="1">반복</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">반복 주기 (초)</label>
        <input type="number" id="fInterval" style="width:100%" value="" placeholder="null">
      </div>
    </div>

    <div id="repeatMetricRow" class="field-row" style="display:none;">
      <div class="field">
        <label class="field-label">반복 메트릭</label>
        <select id="fRepeatMetric" style="width:100%">
          <option value="">없음 (시간 기반)</option>
          <option value="total_distance_m">total_distance_m</option>
          <option value="total_exp_granted">total_exp_granted</option>
          <option value="level">level</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">메트릭 간격</label>
        <input type="number" id="fRepeatMetricInterval" style="width:100%" value="" placeholder="예: 1000 (1km)">
      </div>
    </div>

    <div class="field">
      <label class="field-label">활성 상태</label>
      <select id="fActive" style="width:100%">
        <option value="1">활성 (ON)</option>
        <option value="0">비활성 (OFF)</option>
      </select>
    </div>

    <!-- Conditions -->
    <div class="field" style="border-top:1px solid rgba(255,255,255,.08);padding-top:18px;margin-top:8px;">
      <label class="field-label">조건 (AND 결합)</label>
      <div id="condBox"></div>
      <button type="button" class="btn btn-ghost btn-sm" onclick="addCond()" style="margin-top:8px;">+ 조건 추가</button>
    </div>

    <!-- Actions -->
    <div class="field" style="border-top:1px solid rgba(255,255,255,.08);padding-top:18px;margin-top:8px;">
      <label class="field-label">액션</label>
      <div id="actBox"></div>
      <button type="button" class="btn btn-ghost btn-sm" onclick="addAct()" style="margin-top:8px;">+ 액션 추가</button>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:24px;">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn" id="saveBtn" onclick="savePolicy()">저장</button>
    </div>
  </div>
</div>

<script>
const API = '/admin/api/sre/policies';
const METRICS = ['total_distance_m', 'total_exp_granted', 'level'];
const OPS = ['>=', '>', '==', '<=', '<', 'in'];
const ACTION_TYPES = [
  {v:'GRANT_XP',  l:'XP 지급'},
  {v:'GRANT_EXP', l:'EXP 지급'},
  {v:'GRANT_GOLD',l:'Gold 지급'},
  {v:'GRANT_BADGE',l:'배지 지급'},
];

let policies = [];
let conds = [];
let acts = [];

// ── Load ──
async function load() {
  const r = await fetch(API);
  policies = await r.json();
  render();
}

function render() {
  const body = document.getElementById('policyBody');
  const empty = document.getElementById('emptyState');
  document.getElementById('policyCount').textContent = policies.length;
  if (!policies.length) { body.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  body.innerHTML = policies.map(p => {
    const condSummary = (p.conditions||[]).map(c => `${c.metric} ${c.op} ${c.value}`).join(' AND ');
    const actSummary = (p.actions||[]).length + '개';
    const active = p.is_active
      ? '<span class="pill on">ON</span>'
      : '<span class="pill off">OFF</span>';
    const repeatLabel = p.repeat_metric
      ? `${p.repeat_metric} ×${p.repeat_metric_interval}`
      : (p.repeat_interval ? `${p.repeat_interval}s` : '');
    const repeat = p.is_repeatable
      ? '<span class="pill warn">반복' + (repeatLabel ? ` ${repeatLabel}` : '') + '</span>'
      : '<span class="pill off">1회</span>';
    return `<tr>
      <td style="font-family:monospace;font-size:12px;">${esc(p.policy_code)}</td>
      <td>${esc(p.name)}</td>
      <td style="font-size:11px;color:rgba(255,255,255,.5);">${esc(condSummary)}</td>
      <td>${actSummary}</td>
      <td>${p.priority}</td>
      <td>${repeat}</td>
      <td>${active}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-ghost btn-sm" onclick="editPolicy(${p.id})">수정</button>
        <button class="btn btn-ghost btn-sm" onclick="togglePolicy(${p.id},${p.is_active?'false':'true'})">
          ${p.is_active?'OFF':'ON'}
        </button>
        <button class="btn btn-danger btn-sm" onclick="deletePolicy(${p.id},'${esc(p.policy_code)}')">삭제</button>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// ── Modal ──
function openModal(p) {
  document.getElementById('editId').value = p ? p.id : '';
  document.getElementById('modalTitle').textContent = p ? '정책 수정' : '새 정책 등록';
  document.getElementById('fCode').value = p ? p.policy_code : '';
  document.getElementById('fName').value = p ? p.name : '';
  document.getElementById('fDesc').value = p ? (p.description||'') : '';
  document.getElementById('fPriority').value = p ? p.priority : 10;
  document.getElementById('fRepeatable').value = p && p.is_repeatable ? '1' : '0';
  document.getElementById('fInterval').value = p && p.repeat_interval != null ? p.repeat_interval : '';
  document.getElementById('fRepeatMetric').value = p && p.repeat_metric ? p.repeat_metric : '';
  document.getElementById('fRepeatMetricInterval').value = p && p.repeat_metric_interval != null ? p.repeat_metric_interval : '';
  document.getElementById('fActive').value = p && p.is_active === false ? '0' : '1';
  toggleRepeat();
  conds = p && p.conditions ? JSON.parse(JSON.stringify(p.conditions)) : [];
  acts = p && p.actions ? p.actions.map(a => ({action_type:a.action_type, value:a.value, ref_id:a.ref_id||'', sort_order:a.sort_order||0})) : [];
  renderConds();
  renderActs();
  document.getElementById('policyModal').style.display = '';
}

function closeModal() { document.getElementById('policyModal').style.display = 'none'; }

function toggleRepeat() {
  const on = document.getElementById('fRepeatable').value === '1';
  document.getElementById('repeatMetricRow').style.display = on ? '' : 'none';
}

// ── Conditions ──
function renderConds() {
  const el = document.getElementById('condBox');
  el.innerHTML = '';
  conds.forEach((c, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:6px;';
    const metricOpts = METRICS.map(m => `<option value="${m}" ${c.metric===m?'selected':''}>${m}</option>`).join('');
    const opOpts = OPS.map(o => `<option value="${o}" ${c.op===o?'selected':''}>${o}</option>`).join('');
    row.innerHTML = `
      <select onchange="conds[${i}].metric=this.value" style="flex:2">${metricOpts}</select>
      <select onchange="conds[${i}].op=this.value" style="width:60px">${opOpts}</select>
      <input type="number" value="${c.value||0}" onchange="conds[${i}].value=+this.value" style="width:100px">
      <button type="button" onclick="conds.splice(${i},1);renderConds()" style="background:none;color:#fc8181;font-size:18px;cursor:pointer;">&times;</button>
    `;
    el.appendChild(row);
  });
}

function addCond() {
  conds.push({metric: METRICS[0], op: '>=', value: 0});
  renderConds();
}

// ── Actions ──
function renderActs() {
  const el = document.getElementById('actBox');
  el.innerHTML = '';
  acts.forEach((a, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:6px;';
    const typeOpts = ACTION_TYPES.map(t => `<option value="${t.v}" ${a.action_type===t.v?'selected':''}>${t.l}</option>`).join('');
    const isBadge = a.action_type === 'GRANT_BADGE';
    row.innerHTML = `
      <select onchange="acts[${i}].action_type=this.value;renderActs()" style="flex:2">${typeOpts}</select>
      <input type="number" value="${a.value||0}" onchange="acts[${i}].value=+this.value" style="width:80px" placeholder="value" ${isBadge?'disabled':''}>
      <input type="text" value="${a.ref_id||''}" onchange="acts[${i}].ref_id=this.value||null" style="width:220px;font-size:11px;" placeholder="${isBadge?'badge UUID':'ref_id (optional)'}">
      <input type="number" value="${a.sort_order||0}" onchange="acts[${i}].sort_order=+this.value" style="width:56px" placeholder="순서" title="sort_order">
      <button type="button" onclick="acts.splice(${i},1);renderActs()" style="background:none;color:#fc8181;font-size:18px;cursor:pointer;">&times;</button>
    `;
    el.appendChild(row);
  });
}

function addAct() {
  acts.push({action_type: 'GRANT_XP', value: 0, ref_id: null, sort_order: acts.length});
  renderActs();
}

// ── Save ──
async function savePolicy() {
  const id = document.getElementById('editId').value;
  const body = {
    policy_code: document.getElementById('fCode').value.trim(),
    name: document.getElementById('fName').value.trim(),
    description: document.getElementById('fDesc').value.trim() || null,
    conditions: conds,
    is_repeatable: document.getElementById('fRepeatable').value === '1',
    repeat_interval: document.getElementById('fInterval').value ? +document.getElementById('fInterval').value : null,
    repeat_metric: document.getElementById('fRepeatMetric').value || null,
    repeat_metric_interval: document.getElementById('fRepeatMetricInterval').value ? +document.getElementById('fRepeatMetricInterval').value : null,
    is_active: document.getElementById('fActive').value === '1',
    priority: +document.getElementById('fPriority').value || 10,
    actions: acts.map(a => ({
      action_type: a.action_type,
      value: a.action_type === 'GRANT_BADGE' ? 0 : (+a.value || 0),
      ref_id: a.ref_id || null,
      sort_order: a.sort_order || 0,
    })),
  };
  if (!body.policy_code || !body.name) { alert('정책 코드와 이름은 필수입니다.'); return; }

  const url = id ? `${API}/${id}` : API;
  const method = id ? 'PUT' : 'POST';
  const r = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if (!r.ok) { const e = await r.text(); alert('저장 실패: ' + e); return; }
  closeModal();
  await load();
}

// ── Toggle / Delete ──
async function togglePolicy(id, active) {
  const p = policies.find(x => x.id === id);
  if (!p) return;
  const body = Object.assign({}, p, {is_active: active});
  body.actions = (p.actions||[]).map(a => ({action_type:a.action_type,value:a.value,ref_id:a.ref_id,sort_order:a.sort_order}));
  const r = await fetch(`${API}/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if (!r.ok) { alert('변경 실패'); return; }
  await load();
}

async function editPolicy(id) {
  const r = await fetch(`${API}/${id}`);
  if (!r.ok) { alert('정책 로드 실패'); return; }
  const p = await r.json();
  openModal(p);
}

async function deletePolicy(id, code) {
  if (!confirm(`정책 "${code}"을(를) 삭제하시겠습니까?`)) return;
  const r = await fetch(`${API}/${id}`, {method:'DELETE'});
  if (!r.ok) { const e = await r.text(); alert('삭제 실패: ' + e); return; }
  await load();
}

load();
</script>
