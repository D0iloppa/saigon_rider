server {
    listen 80;
    server_name localhost;

    # Docker 내부 DNS resolver (backend profile 미사용 시에도 nginx 기동 가능하게)
    resolver 127.0.0.11 valid=10s;

    # Frontend (Vue dev server + HMR WebSocket)
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (backend profile로 별도 기동 시 활성화됨)
    location /api/ {
        set $backend_url http://backend:8080;
        proxy_pass $backend_url/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Imgproxy - 이미지 처리
    # 사용 예시 (서명 없음, 개발): /img/insecure/fill/400/300/sm/0/plain/local:///user-contents/photo.jpg@webp
    location /img/ {
        proxy_pass http://imgproxy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
