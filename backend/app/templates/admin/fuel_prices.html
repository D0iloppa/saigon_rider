<p class="page-title">유가 관리</p>
<p class="page-sub">브랜드 × 연료별 참고가 수동 입력 · fuel_price_snapshot (외부 자동수집 v1.1 이월, 현재 1차 운영 수단)</p>

{{flash}}

<form method="post" action="/admin/fuel">
  <div class="card" style="margin-bottom:24px;">
    <p style="font-size:13px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:18px;letter-spacing:.04em;text-transform:uppercase;">가격 입력 / 갱신</p>
    <div style="display:grid;grid-template-columns:140px 1fr;gap:12px 16px;align-items:center;max-width:560px;">
      <label style="font-size:12px;color:rgba(255,255,255,.6);">브랜드</label>
      <select name="brand" required style="width:240px;font-size:13px;">
        <option value="PETROLIMEX">Petrolimex</option>
        <option value="PVOIL">PV Oil</option>
        <option value="SAIGON_PETRO">Saigon Petro</option>
        <option value="MIPEC">Mipec</option>
        <option value="COMECO">Comeco</option>
        <option value="MARKET_AVG">시장 평균 (MARKET_AVG)</option>
      </select>

      <label style="font-size:12px;color:rgba(255,255,255,.6);">연료</label>
      <select name="fuel_type" required style="width:240px;font-size:13px;">
        <option value="RON95_III">RON 95-III</option>
        <option value="RON95_V">RON 95-V</option>
        <option value="E5_RON92_II">E5 RON 92-II</option>
        <option value="DO_001S_V">DO 0.01S-V</option>
        <option value="DO_005S_II">DO 0.05S-II</option>
      </select>

      <label style="font-size:12px;color:rgba(255,255,255,.6);">가격 (VND/L)</label>
      <div>
        <input type="number" name="price_vnd" min="10000" max="60000" required
               placeholder="21560" style="width:160px;font-size:13px;text-align:right;" />
        <span style="font-size:11px;color:rgba(255,255,255,.35);margin-left:8px;">10,000 ~ 60,000</span>
      </div>

      <label style="font-size:12px;color:rgba(255,255,255,.6);">적용일</label>
      <div>
        <input type="date" name="effective_date" value="{{today}}" style="width:160px;font-size:13px;" />
        <span style="font-size:11px;color:rgba(255,255,255,.35);margin-left:8px;">비우면 오늘</span>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:12px;align-items:center;">
      <button type="submit" class="btn">저장</button>
      <span style="font-size:11px;color:rgba(255,255,255,.35);">region=VUNG_1(호치민), source=manual:admin 고정. 같은 키는 덮어쓰기.</span>
    </div>
  </div>
</form>

<div class="card">
  <p style="font-size:13px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:14px;letter-spacing:.04em;text-transform:uppercase;">현재 ACTIVE 참고가</p>
  <table class="table">
    <thead>
      <tr>
        <th>브랜드</th>
        <th>연료</th>
        <th style="text-align:right;">가격 (VND/L)</th>
        <th>적용일</th>
        <th>source</th>
      </tr>
    </thead>
    <tbody>
      {{price_rows}}
    </tbody>
  </table>
</div>
