<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Saigon Rider — Item Catalog v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0B0D14;--surface:#12141E;--surface2:#181A28;--border:#1E2235;--border2:#252840;
  --text:#F0F2FF;--text2:#8A8E9E;--brand:#FF5A1F;
  --C:#9CA3AF;--R:#3B82F6;--E:#A855F7;--L:#EAB308;--M:#EC4899;
  --neon:#00F0FF;--lime:#B6FF1C;--gold:#FFB800;
  --font:'Space Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
a{color:inherit;text-decoration:none}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.header-title span{color:var(--brand)}
.header-badge{display:inline-flex;align-items:center;background:rgba(255,90,31,.12);border:1px solid rgba(255,90,31,.3);color:var(--brand);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;font-family:var(--mono)}
.header-sub{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text2);text-align:right;line-height:1.7}

/* TAB NAV */
.tab-nav{display:flex;gap:4px;padding:14px 28px 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.5px}
.tab:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tab.active{background:var(--bg);border-color:var(--border);color:var(--text)}
.tab-count{font-size:10px;font-family:var(--mono);background:rgba(255,255,255,.08);border-radius:10px;padding:1px 6px}
.tab.active .tab-count{background:rgba(255,90,31,.2);color:var(--brand)}

/* CONTROLS */
.controls{padding:14px 28px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--surface2)}
.filter-label{font-family:var(--mono);font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-right:4px}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--text2);color:var(--text)}
.pill.active{border-color:rgba(255,90,31,.5);background:rgba(255,90,31,.12);color:var(--brand)}
.pill[data-g="C"].active{border-color:var(--C);background:rgba(156,163,175,.12);color:var(--C)}
.pill[data-g="R"].active{border-color:var(--R);background:rgba(59,130,246,.12);color:#93C5FD}
.pill[data-g="E"].active{border-color:var(--E);background:rgba(168,85,247,.12);color:#D8B4FE}
.pill[data-g="L"].active{border-color:var(--L);background:rgba(234,179,8,.12);color:#FDE047}
.pill[data-g="M"].active{border-color:var(--M);background:rgba(236,72,153,.12);color:#F9A8D4}
.divider{width:1px;height:20px;background:var(--border);margin:0 4px}

/* CONTENT */
#content{padding:24px 28px 40px;min-height:300px}
.slot-section{margin-bottom:32px}
.slot-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--text2)}
.slot-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.slot-title{color:var(--text);font-weight:700;font-size:13px;margin-right:4px}
.slot-sub{margin-left:auto;font-size:10px}

/* CARDS */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.item-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.item-card[data-g="C"]{border-top:2px solid var(--C)}
.item-card[data-g="R"]{border-top:2px solid var(--R)}
.item-card[data-g="E"]{border-top:2px solid var(--E)}
.item-card[data-g="L"]{border-top:2px solid var(--L);box-shadow:0 0 14px rgba(234,179,8,.06)}
.item-card[data-g="M"]{border-top:2px solid var(--M);border-color:rgba(236,72,153,.3);box-shadow:0 0 18px rgba(236,72,153,.1)}
.item-card.hidden{display:none}
.item-thumb{width:100%;aspect-ratio:1;background:linear-gradient(180deg,#0d0f1a,#080910);display:flex;align-items:center;justify-content:center;overflow:hidden}
.item-thumb.wide{aspect-ratio:3/1}
.item-thumb svg{width:90%;height:90%}
.item-info{padding:8px 10px 10px}
.item-name{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rarity-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.rarity-badge.C{background:rgba(156,163,175,.15);color:var(--C);border:1px solid var(--C)}
.rarity-badge.R{background:rgba(59,130,246,.15);color:#93C5FD;border:1px solid var(--R)}
.rarity-badge.E{background:rgba(168,85,247,.15);color:#D8B4FE;border:1px solid var(--E)}
.rarity-badge.L{background:rgba(234,179,8,.15);color:#FDE047;border:1px solid var(--L)}
.rarity-badge.M{background:rgba(236,72,153,.15);color:#F9A8D4;border:1px solid var(--M)}
.new-badge{font-family:var(--mono);font-size:8px;font-weight:800;padding:2px 5px;border-radius:6px;background:var(--brand);color:#fff}
.item-id{font-family:var(--mono);font-size:8px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* LOADING / EMPTY */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--text2);font-family:var(--mono);font-size:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{background:var(--surface);border-top:1px solid var(--border);padding:16px 28px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.stat-block{text-align:center;font-family:var(--mono)}
.stat-val{font-size:20px;font-weight:800;line-height:1}
.stat-key{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.footer-copy{margin-left:auto;font-size:10px;color:var(--text2);font-family:var(--mono)}
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeTab = 'BIKE';
let activeGrade = 'ALL';
let activeSlot = 'ALL';
const loadedSprites = new Set();

// ─── SVG LOADING ─────────────────────────────────────────────────────────────
async function ensureSprite(tab) {
  if (loadedSprites.has(tab)) return;
  const url = CATALOG[tab].svg;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const svg = await r.text();
    document.getElementById('svg-sprites').insertAdjacentHTML('beforeend', svg);
    loadedSprites.add(tab);
  } catch(e) {
    console.warn('SVG load failed:', url, e);
  }
}

// ─── SLOT FILTER BAR ─────────────────────────────────────────────────────────
function buildSlotFilters(tab) {
  const slots = CATALOG[tab].slots;
  const el = document.getElementById('slot-filters');
  el.innerHTML =
    `<button class="pill ${activeSlot==='ALL'?'active':''}" data-s="ALL" onclick="setSlot('ALL',this)">ALL</button>` +
    slots.map(s =>
      `<button class="pill ${activeSlot===s?'active':''}" data-s="${s}" onclick="setSlot('${s}',this)">${s}</button>`
    ).join('');
}

// ─── CARD BUILDER ────────────────────────────────────────────────────────────
const SLOT_COLORS = {
  Scooter:'#FF5A1F',Automatic:'#3B82F6',Sport:'#A855F7',Premium:'#EAB308',Classic:'#9CA3AF',
  GLOVES:'#FF5A1F',BOOTS:'#3B82F6',EYEWEAR:'#A855F7',NAMEPLATE:'#EAB308',
  HANDLEBAR:'#FF5A1F',TAIL_LIGHT:'#EC4899',ENGINE_COVER:'#00F0FF',
  HEADLIGHT:'#FFB800',MIRROR:'#3B82F6',NUMBER:'#B6FF1C',
  SEAT:'#FF5A1F',STICKER:'#3B82F6',RANK_CARD:'#A855F7',
  TRAIL:'#00F0FF',HORN:'#FFB800',START_ANIM:'#EC4899',
  FRAME:'#FF5A1F',BACKDROP:'#3B82F6',TITLE:'#A855F7',
  EMOTE:'#FF5A1F',BANNER:'#00F0FF',PET:'#B6FF1C',
};

function buildCard(item, tab) {
  const isTitle = item.slot === 'TITLE';
  const vb = isTitle ? '0 0 200 60' : '0 0 200 200';
  const thumbClass = isTitle ? 'item-thumb wide' : 'item-thumb';
  const slotKey = CATALOG[tab].slotKey;
  const slotVal = item[slotKey];
  const dot = SLOT_COLORS[slotVal] || '#8A8E9E';
  return `<div class="item-card" data-g="${item.g}" data-s="${slotVal}">
    <div class="${thumbClass}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}"><use href="#item-${item.id}"/></svg>
    </div>
    <div class="item-info">
      <div class="item-name" title="${item.name}">${item.name}</div>
      <div class="item-meta">
        <span class="rarity-badge ${item.g}">${item.g}</span>
        <span class="new-badge">NEW</span>
      </div>
      <div class="item-id">${item.id}</div>
    </div>
  </div>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const cat = CATALOG[activeTab];
  const slotKey = cat.slotKey;
  let items = cat.items;
  if (activeGrade !== 'ALL') items = items.filter(i => i.g === activeGrade);
  if (activeSlot !== 'ALL') items = items.filter(i => i[slotKey] === activeSlot);

  document.getElementById('stat-showing').textContent = items.length;

  const slotsToShow = activeSlot === 'ALL' ? cat.slots : [activeSlot];
  let html = '';
  for (const s of slotsToShow) {
    const slotItems = items.filter(i => i[slotKey] === s);
    if (!slotItems.length) continue;
    const dot = SLOT_COLORS[s] || '#8A8E9E';
    html += `<div class="slot-section">
      <div class="slot-header">
        <div class="slot-dot" style="background:${dot}"></div>
        <span class="slot-title">${s}</span>
        <span class="slot-sub">${slotItems.length} items</span>
      </div>
      <div class="items-grid">${slotItems.map(i => buildCard(i, activeTab)).join('')}</div>
    </div>`;
  }

  if (!html) {
    html = `<div class="state-msg"><div>No items match the current filter.</div></div>`;
  }
  document.getElementById('content').innerHTML = html;
}

// ─── TAB SWITCH ──────────────────────────────────────────────────────────────
async function switchTab(tab, btn) {
  activeTab = tab;
  activeSlot = 'ALL';

  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('slot-filters').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  buildSlotFilters(tab);

  document.getElementById('content').innerHTML = `<div class="state-msg"><div class="spinner"></div><div>Loading sprites…</div></div>`;
  await ensureSprite(tab);
  render();
}

// ─── FILTER HANDLERS ─────────────────────────────────────────────────────────
function setGrade(g, btn) {
  activeGrade = g;
  document.querySelectorAll('#grade-filters .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSlot(s, btn) {
  activeSlot = s;
  document.querySelectorAll('#slot-filters .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(async () => {
  buildSlotFilters('BIKE');
  await ensureSprite('BIKE');
  render();
})();
</script>
