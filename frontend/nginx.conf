server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 — React Router 경로를 index.html로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 빌드 결과물(해시 포함 파일명)은 장기 캐시
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html은 캐시 금지 (배포 시 항상 최신 버전)
    # expires 디렉티브는 Cache-Control: max-age=0 을 추가로 emit해 add_header와
    # 중복/충돌(WKWebView가 max-age=0을 집어 콜드런치 시 stale)을 일으키므로 사용하지 않는다.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
